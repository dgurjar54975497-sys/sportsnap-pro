<body>
  <div class="header">
    <div class="logo">🏏 SportSnap PRO ⚡</div>
    <div class="auth-buttons">
      <button class="btn-small" id="loginBtn" onclick="openLogin()">Login</button>
      <button class="btn-small" id="signupBtn" onclick="openSignup()" style="background: linear-gradient(135deg, #00D4FF, #7C3AED); color: white;">Sign Up</button>
      <div class="user-profile" id="userProfile" style="display: none;">
        <div class="avatar" id="userAvatar">U</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-sport="cricket">🏏 Cricket</button>
    <button class="tab" data-sport="football">⚽ Football</button>
    <button class="tab" data-sport="basketball">🏀 Basketball</button>
    <button class="tab" data-sport="tennis">🎾 Tennis</button>
  </div>

  <div class="section-title">🔴 LIVE MATCHES</div>
  <div id="errorContainer"></div>
  <div id="matchesContainer" class="matches-grid"></div>

  <div class="bottom-nav">
    <div class="nav-item active" data-page="home">
      <div class="nav-icon">🏠</div>
      <div>Home</div>
    </div>
    <div class="nav-item" data-page="clubs">
      <div class="nav-icon">🏆</div>
      <div>Clubs</div>
    </div>
    <div class="nav-item" data-page="reels">
      <div class="nav-icon">🎬</div>
      <div>Reels</div>
    </div>
    <div class="nav-item" data-page="favorites">
      <div class="nav-icon">❤️</div>
      <div>Favorites</div>
    </div>
    <div class="nav-item" data-page="profile">
      <div class="nav-icon">👤</div>
      <div>Profile</div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <div class="modal-title">Login</div>
      <input class="input-field" id="loginEmail" type="email" placeholder="Email">
      <input class="input-field" id="loginPassword" type="password" placeholder="Password">
      <button class="btn-primary" onclick="handleLogin()">Login</button>
      <button class="btn-secondary" onclick="closeLogin()">Cancel</button>
    </div>
  </div>

  <!-- Signup Modal -->
  <div class="modal" id="signupModal">
    <div class="modal-content">
      <div class="modal-title">Sign Up</div>
      <input class="input-field" id="signupName" type="text" placeholder="Username">
      <input class="input-field" id="signupEmail" type="email" placeholder="Email">
      <input class="input-field" id="signupPassword" type="password" placeholder="Password">
      <button class="btn-primary" onclick="handleSignup()">Create Account</button>
      <button class="btn-secondary" onclick="closeSignup()">Cancel</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "sportsnap-pro.firebaseapp.com",
      projectId: "sportsnap-pro",
      storageBucket: "sportsnap-pro.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let selectedSport = 'cricket';
    let favorites = [];

    // Auth State
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('signupBtn').style.display = 'none';
        document.getElementById('userProfile').style.display = 'flex';
        document.getElementById('userAvatar').textContent = user.email.charAt(0).toUpperCase();
        loadFavorites();
      } else {
        currentUser = null;
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('signupBtn').style.display = 'block';
        document.getElementById('userProfile').style.display = 'none';
      }
    });

    // UI Functions
    window.openLogin = () => document.getElementById('loginModal').classList.add('active');
    window.closeLogin = () => document.getElementById('loginModal').classList.remove('active');
    window.openSignup = () => document.getElementById('signupModal').classList.add('active');
    window.closeSignup = () => document.getElementById('signupModal').classList.remove('active');

    window.handleLogin = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        closeLogin();
      } catch (error) {
        alert('Login failed: ' + error.message);
      }
    };

    window.handleSignup = async () => {
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const name = document.getElementById('signupName').value;
      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        await addDoc(collection(db, 'users'), {
          uid: result.user.uid,
          name: name,
          email: email,
          createdAt: new Date()
        });
        closeSignup();
      } catch (error) {
        alert('Signup failed: ' + error.message);
      }
    };

    // Load Matches
    async function fetchMatches() {
      const container = document.getElementById('matchesContainer');
      const errorContainer = document.getElementById('errorContainer');
      
      container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading matches...</div>';
      errorContainer.innerHTML = '';

      try {
        const response = await fetch('/api/scores?sport=' + selectedSport);
        const data = await response.json();

        if (!data || data.length === 0) {
          container.innerHTML = '<div class="loading">No matches right now 📭</div>';
          return;
        }

        container.innerHTML = data.map(match => `
          <div class="match-card">
            <div class="match-header">
              <div class="live-badge">
                <div class="live-dot"></div>
                LIVE
              </div>
              <button class="fav-btn ${favorites.includes(match.team1 + ' vs ' + match.team2) ? 'active' : ''}" 
                      onclick="toggleFavorite('${match.team1} vs ${match.team2}')">❤️</button>
            </div>
            <div class="match-title">${match.team1} vs ${match.team2}</div>
            <div class="score-section">
              <div class="team">
                <div class="team-name">${match.team1}</div>
                <div class="team-score">${match.score1}</div>
              </div>
              <div class="vs">VS</div>
              <div class="team">
                <div class="team-name">${match.team2}</div>
                <div class="team-score">${match.score2}</div>
              </div>
            </div>
            <div class="match-footer">
              <span>⏱️ ${match.status}</span>
              <span>${match.venue || match.league || ''}</span>
            </div>
          </div>
        `).join('');
      } catch (error) {
        errorContainer.innerHTML = '<div class="error">⚠️ Error loading matches: ' + error.message + '</div>';
      }
    }

    // Favorites
    window.toggleFavorite = async (matchName) => {
      if (!currentUser) {
        alert('Please login to add favorites');
        return;
      }

      try {
        if (favorites.includes(matchName)) {
          favorites = favorites.filter(f => f !== matchName);
        } else {
          favorites.push(matchName);
        }
        
        await addDoc(collection(db, 'users', currentUser.uid, 'favorites'), {
          match: matchName,
          sport: selectedSport,
          addedAt: new Date()
        });

        fetchMatches();
      } catch (error) {
        console.error('Error:', error);
      }
    };

    async function loadFavorites() {
      if (!currentUser) return;
      try {
        const snapshot = await getDocs(collection(db, 'users', currentUser.uid, 'favorites'));
        favorites = snapshot.docs.map(doc => doc.data().match);
      } catch (error) {
        console.error('Error loading favorites:', error);
      }
    }

    // Event Listeners
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSport = btn.dataset.sport;
        fetchMatches();
      });
    });

    // Initial Load
    fetchMatches();
    setInterval(fetchMatches, 30000);
  </script>
</body>
</html>
