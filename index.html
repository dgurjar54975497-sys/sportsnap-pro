 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO - IPL 2026</title>
  <style>
    :root {
      --bg: #0a0f1c;
      --card: #1a2338;
      --accent: #22c55e;
      --live: #ef4444;
      --gold: #fbbf24;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e2937, #334155);
      padding: 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { font-size: 2rem; font-weight: 700; }
    .subtitle { color: var(--accent); font-size: 1rem; }

    .tabs {
      display: flex;
      background: #111827;
      padding: 12px 8px;
      gap: 8px;
      overflow-x: auto;
      position: sticky;
      top: 57px;
      z-index: 90;
    }
    .tab {
      padding: 12px 24px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      background: var(--accent);
      color: #000;
    }

    .container { padding: 16px; }

    .match-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .thumbnail {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--live);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
    }
    .card-body {
      padding: 16px;
    }
    .match-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .score {
      font-size: 1.65rem;
      color: var(--accent);
      font-weight: 800;
    }
    .detail {
      color: #94a3b8;
      margin: 8px 0;
    }
    .community {
      background: linear-gradient(90deg, #1e3a8a, #3b82f6);
      color: white;
      padding: 16px;
      border-radius: 16px;
      margin: 20px 0;
      text-align: center;
    }
    button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: bold;
      display: block;
      margin: 20px auto;
    }
    .ai-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sportsnap PRO</h1>
    <p class="subtitle">🏏 IPL 2026 • LIVE Scores & Highlights</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="loadIPL()">IPL 2026</div>
    <div class="tab" onclick="loadCommunity()">Community</div>
    <div class="tab" onclick="loadOther()">Other Sports</div>
  </div>

  <div class="container" id="mainContainer"></div>

  <script>
    function loadIPL() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `
        <button onclick="loadIPL()">🔄 Refresh IPL Matches</button>
      `;

      const matches = [
        {
          title: "Chennai Super Kings vs Gujarat Titans",
          competition: "IPL 2026 • 37th Match",
          score: "GT opt to bowl",
          detail: "T20 • Narendra Modi Stadium",
          status: "Upcoming"
        },
        {
          title: "Royal Challengers Bengaluru vs Chennai Super Kings",
          competition: "IPL 2026",
          score: "RCB 189/5 (19.2 ov)",
          detail: "RCB needs 9 runs in 4 balls",
          status: "LIVE"
        }
      ];

      matches.forEach(match => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
          <div style="position:relative;">
            <img src="https://picsum.photos/id/1018/800/400" class="thumbnail" alt="IPL">
            ${match.status === "LIVE" ? `<div class="live-badge">● LIVE</div>` : ''}
          </div>
          <div class="card-body">
            <div class="match-title">${match.title}</div>
            <div style="color:#94a3b8;">${match.competition}</div>
            <div class="score">${match.score}</div>
            <div class="detail">${match.detail}</div>
            <button class="ai-btn" onclick="showAI('${match.title}')">🤖 AI Analyst</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function loadCommunity() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `
        <div class="community">
          <h2>🏏 IPL Community</h2>
          <p>Join 12,450+ fans discussing IPL 2026</p>
          <button onclick="alert('Community join feature coming soon!\\n\\nYou can discuss matches, predict winners, and share opinions.')">
            Join Community
          </button>
        </div>
        <p style="text-align:center; color:#94a3b8; margin-top:30px;">
          Share your predictions • Discuss live matches • Poll for Man of the Match
        </p>
      `;
    }

    function loadOther() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `<p style="text-align:center; padding:100px 20px; color:#94a3b8;">Football, Basketball & Tennis coming soon...</p>`;
    }

    function showAI(title) {
      alert(`🤖 AI Analyst for ${title}\n\n• High-scoring thriller expected\n• Key players in form\n• Tactical battle between bat and ball\n\nDetailed analysis coming soon!`);
    }

    // Initial Load
    window.onload = loadIPL;
  </script>
</body>
</html>
