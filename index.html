cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportSnap PRO ⚡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0E1A; color: #F0F4FF; font-family: Arial, sans-serif; min-height: 100vh; }
    
    .header { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 20px; border-bottom: 1px solid #1E2D45;
      background: linear-gradient(135deg, #0A0E1A, #111827);
    }
    
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 32px; }
    .logo-text { font-size: 24px; font-weight: 900; 
      background: linear-gradient(135deg, #00D4FF, #7C3AED); 
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
    }
    
    .sport-tabs { 
      display: flex; gap: 10px; padding: 15px 20px; 
      overflow-x: auto; border-bottom: 1px solid #1E2D45;
      scrollbar-width: none;
    }
    .sport-tabs::-webkit-scrollbar { display: none; }
    
    .sport-btn { 
      padding: 8px 18px; border: 2px solid #1E2D45; background: transparent; 
      color: #8A9BB5; border-radius: 20px; cursor: pointer; font-size: 14px; 
      font-weight: 600; transition: all 0.3s; white-space: nowrap;
    }
    .sport-btn:hover, .sport-btn.active { 
      border-color: #00D4FF; color: #00D4FF; 
      background: rgba(0, 212, 255, 0.1); 
    }
    
    .section-title { 
      padding: 15px 20px 5px; font-size: 14px; 
      color: #8A9BB5; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
    }
    
    .matches-container { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
    
    .match-card { 
      background: #111827; border: 1px solid #1E2D45; border-radius: 16px; 
      padding: 16px; transition: all 0.3s; cursor: pointer;
    }
    .match-card:hover { background: #151D2E; border-color: #00D4FF; }
    
    .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    
    .live-badge { 
      background: rgba(255, 61, 87, 0.2); color: #FF3D57; 
      padding: 3px 10px; border-radius: 20px; font-size: 11px; 
      font-weight: 700; display: flex; align-items: center; gap: 4px;
    }
    .live-dot { 
      width: 6px; height: 6px; background: #FF3D57; 
      border-radius: 50%; animation: blink 1s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    
    .match-status { font-size: 12px; color: #4A5568; }
    
    .teams { display: flex; justify-content: space-between; align-items: center; }
    .team { text-align: center; flex: 1; }
    .team-name { font-size: 13px; color: #8A9BB5; margin-bottom: 6px; font-weight: 600; }
    .team-score { font-size: 28px; font-weight: 900; color: #00D4FF; }
    
    .vs-divider { 
      font-size: 12px; color: #4A5568; font-weight: 700;
      padding: 0 10px;
    }
    
    .loading { 
      text-align: center; padding: 60px 20px; color: #8A9BB5; font-size: 16px;
    }
    .loading-spinner { 
      width: 40px; height: 40px; border: 3px solid #1E2D45;
      border-top: 3px solid #00D4FF; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .error { 
      background: rgba(255, 61, 87, 0.1); border: 1px solid #FF3D57; 
      color: #FF3D57; padding: 20px; border-radius: 10px; margin: 20px; 
      text-align: center; 
    }
    
    .bottom-nav { 
      position: fixed; bottom: 0; left: 0; right: 0; 
      background: #111827; border-top: 1px solid #1E2D45;
      display: flex; justify-content: space-around; padding: 10px 0;
    }
    .nav-btn { 
      display: flex; flex-direction: column; align-items: center; 
      gap: 4px; color: #4A5568; font-size: 10px; cursor: pointer;
      padding: 5px 15px; border-radius: 10px; transition: all 0.3s;
    }
    .nav-btn.active { color: #00D4FF; }
    .nav-icon { font-size: 22px; }
    
    .content { padding-bottom: 80px; }
    
    .refresh-info { 
      text-align: center; padding: 10px; font-size: 11px; 
      color: #4A5568; 
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-icon">🏏</span>
      <span class="logo-text">SportSnap PRO ⚡</span>
    </div>
    <div style="font-size: 20px; cursor: pointer;">👤</div>
  </div>

  <div class="sport-tabs">
    <button class="sport-btn active" data-sport="cricket">🏏 Cricket</button>
    <button class="sport-btn" data-sport="football">⚽ Football</button>
    <button class="sport-btn" data-sport="basketball">🏀 Basketball</button>
    <button class="sport-btn" data-sport="tennis">🎾 Tennis</button>
  </div>

  <div class="content">
    <div class="section-title">🔴 Live Matches</div>
    <div id="error-container"></div>
    <div id="matches-container" class="matches-container"></div>
    <div class="refresh-info" id="refresh-info">Auto-refreshes every 30 seconds</div>
  </div>

  <div class="bottom-nav">
    <div class="nav-btn active">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </div>
    <div class="nav-btn">
      <span class="nav-icon">🏆</span>
      <span>Clubs</span>
    </div>
    <div class="nav-btn">
      <span class="nav-icon">🎬</span>
      <span>Reels</span>
    </div>
    <div class="nav-btn">
      <span class="nav-icon">🎟️</span>
      <span>Tickets</span>
    </div>
    <div class="nav-btn">
      <span class="nav-icon">📰</span>
      <span>News</span>
    </div>
  </div>

  <script>
    let selectedSport = 'cricket';
    let refreshInterval;

    document.querySelectorAll('.sport-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSport = btn.dataset.sport;
        fetchMatches();
      });
    });

    async function fetchMatches() {
      const container = document.getElementById('matches-container');
      const errorContainer = document.getElementById('error-container');
      
      container.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          Loading ${selectedSport} matches...
        </div>
      `;
      errorContainer.innerHTML = '';

      try {
        const response = await fetch('/api/scores?sport=' + selectedSport);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();

        if (!data || data.length === 0) {
          container.innerHTML = `
            <div class="loading">
              📭 No ${selectedSport} matches right now.<br>Check back soon!
            </div>
          `;
          return;
        }

        container.innerHTML = data.map(match => `
          <div class="match-card">
            <div class="card-header">
              <div class="live-badge">
                <div class="live-dot"></div>
                LIVE
              </div>
              <div class="match-status">⏱️ ${match.status}</div>
            </div>
            <div class="teams">
              <div class="team">
                <div class="team-name">${match.team1}</div>
                <div class="team-score">${match.score1}</div>
              </div>
              <div class="vs-divider">VS</div>
              <div class="team">
                <div class="team-name">${match.team2}</div>
                <div class="team-score">${match.score2}</div>
              </div>
            </div>
          </div>
        `).join('');

        const now = new Date();
        document.getElementById('refresh-info').textContent = 
          'Last updated: ' + now.toLocaleTimeString();

      } catch (error) {
        errorContainer.innerHTML = `
          <div class="error">
            ⚠️ Error loading matches: ${error.message}<br>
            <small>Please check your connection</small>
          </div>
        `;
        container.innerHTML = '';
      }
    }

    fetchMatches();
    refreshInterval = setInterval(fetchMatches, 30000);
  </script>
</body>
</html>
EOF

echo "✅ index.html updated!"
