<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportsnap PRO | Elite Live Scores</title>
    <style>
        :root {
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #0ea5e9;
            --accent-green: #10b981;
            --live-red: #ff4757;
            --bg-deep: #020617;
            --text-glow: 0 0 10px rgba(14, 165, 233, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        
        body {
            background: radial-gradient(circle at top, #0f172a 0%, var(--bg-deep) 100%);
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-pro {
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .fantasy-chip {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            text-decoration: none;
            color: white;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        /* --- Custom Tabs --- */
        .nav-scroller {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 12px;
            scrollbar-width: none;
        }
        .nav-scroller::-webkit-scrollbar { display: none; }

        .tab {
            padding: 10px 22px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            font-weight: 600;
        }

        .tab.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }

        /* --- Match Cards --- */
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent-blue);
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .live-tag {
            color: var(--live-red);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-tag::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--live-red);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 80px 1fr;
            align-items: center;
            text-align: center;
        }

        .team img {
            width: 55px;
            height: 55px;
            background: #fff;
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 8px;
        }

        .team-name { font-weight: 700; font-size: 0.9rem; }

        .score-box {
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            text-shadow: var(--text-glow);
        }

        .btn-vid {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--accent-blue);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-vid:hover { background: var(--accent-blue); color: white; }

        /* --- Video Modal --- */
        #video-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            z-index: 2000;
            padding: 20px;
        }

        .close-vid {
            align-self: flex-end;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #vid-frame {
            width: 100%;
            height: 300px;
            border-radius: 15px;
            background: #000;
        }

        /* --- Bottom Nav --- */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid var(--glass-border);
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .nav-btn.active { color: var(--accent-blue); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-pro">SPORTSNAP <span style="color:var(--accent-blue)">PRO</span></div>
        <a href="https://www.dream11.com" target="_blank" class="fantasy-chip">💰 WIN CASH</a>
    </header>

    <div class="nav-scroller" id="tabs">
        <div class="tab active" onclick="loadTab('football', this)">Football</div>
        <div class="tab" onclick="loadTab('ipl', this)">IPL 2026</div>
        <div class="tab" onclick="loadTab('cricket', this)">Cricket</div>
        <div class="tab" onclick="loadTab('basketball', this)">NBA</div>
        <div class="tab" onclick="loadTab('tennis', this)">Tennis</div>
    </div>

    <div class="container" id="match-list">
        </div>

    <div id="video-modal">
        <span class="close-vid" onclick="closeVideo()">×</span>
        <div id="vid-container"></div>
    </div>

    <nav class="bottom-bar">
        <a class="nav-btn active"><span>🏠</span>Home</a>
        <a class="nav-btn"><span>🏆</span>IPL</a>
        <a class="nav-btn"><span>▶️</span>Highlights</a>
        <a class="nav-btn"><span>👤</span>Me</a>
    </nav>

    <script>
        const API_KEY = "https://www.scorebat.com/video-api/v3/";
        const PLACEHOLDER = "https://ui-avatars.com/api/?background=1e293b&color=fff&name=";

        async function fetchLiveFootball() {
            try {
                const res = await fetch(API_KEY);
                const data = await res.json();
                return data.response.map(m => ({
                    league: m.competition,
                    t1: m.title.split(' - ')[0],
                    t2: m.title.split(' - ')[1],
                    score: "FT",
                    status: "Finished",
                    t1img: m.thumbnail,
                    t2img: m.thumbnail,
                    vid: m.videos[0].embed
                }));
            } catch (e) { return null; }
        }

        const MOCK = {
            ipl: [
                { league: "IPL 2026", t1: "Mumbai Indians", t2: "CSK", score: "186/4 (18.2)", status: "LIVE", t1img: "https://scores.iplt20.com/ipl/teamlogos/MI.png", t2img: "https://scores.iplt20.com/ipl/teamlogos/CSK.png", vid: "ipl" },
                { league: "IPL 2026", t1: "RCB", t2: "Gujarat Titans", score: "Result: RCB won", status: "Finished", t1img: "https://scores.iplt20.com/ipl/teamlogos/RCB.png", t2img: "https://scores.iplt20.com/ipl/teamlogos/GT.png", vid: "ipl" }
            ],
            cricket: [
                { league: "T20 International", t1: "India", t2: "South Africa", score: "210/2", status: "LIVE", t1img: PLACEHOLDER+"IND", t2img: PLACEHOLDER+"SA", vid: "cricket" }
            ]
        };

        async function loadTab(sport, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            const list = document.getElementById('match-list');
            list.innerHTML = `<div style="text-align:center; padding:50px; color:#64748b">Fetching Pro Data...</div>`;

            let matches = [];
            if (sport === 'football') {
                matches = await fetchLiveFootball() || [];
            } else {
                matches = MOCK[sport] || [MOCK.ipl[0]]; // Fallback
            }

            render(matches);
        }

        function render(matches) {
            const list = document.getElementById('match-list');
            list.innerHTML = matches.map(m => `
                <div class="card">
                    <div class="match-info">
                        <span>${m.league}</span>
                        <span class="${m.status === 'LIVE' ? 'live-tag' : ''}">${m.status}</span>
                    </div>
                    <div class="scoreboard">
                        <div class="team">
                            <img src="${m.t1img}" onerror="this.src='${PLACEHOLDER+m.t1}'">
                            <div class="team-name">${m.t1}</div>
                        </div>
                        <div class="score-box">${m.score}</div>
                        <div class="team">
                            <img src="${m.t2img}" onerror="this.src='${PLACEHOLDER+m.t2}'">
                            <div class="team-name">${m.t2}</div>
                        </div>
                    </div>
                    <button class="btn-vid" onclick="playVid('${btoa(m.vid)}')">📺 In-App Highlights</button>
                </div>
            `).join('');
        }

        function playVid(encoded) {
            const embed = atob(encoded);
            const modal = document.getElementById('video-modal');
            const container = document.getElementById('vid-container');
            
            modal.style.display = 'flex';
            
            if (embed.includes('<iframe')) {
                container.innerHTML = embed;
                const iframe = container.querySelector('iframe');
                iframe.style.width = "100%";
                iframe.style.height = "350px";
                iframe.style.borderRadius = "15px";
            } else {
                container.innerHTML = `<div style="padding:40px; text-align:center">Highlight Stream starting in-app...</div>`;
            }
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('vid-container').innerHTML = '';
        }

        // Default Load
        window.onload = () => loadTab('football', document.querySelector('.tab'));
    </script>
</body>
</html>
