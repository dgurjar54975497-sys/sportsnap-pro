    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO ⚽ LIVE</title>
  <style>
    :root {
      --bg: #0a0f1c;
      --card: #1a2338;
      --accent: #22c55e;
      --live: #ef4444;
      --text: #e2e8f0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e2937, #334155);
      padding: 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { font-size: 1.8rem; font-weight: 700; }
    .subtitle { color: var(--accent); font-size: 0.95rem; }

    .tabs {
      display: flex;
      overflow-x: auto;
      background: #111827;
      padding: 12px 8px;
      gap: 8px;
      position: sticky;
      top: 57px;
      z-index: 90;
    }
    .tab {
      padding: 10px 18px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      background: var(--accent);
      color: #000;
    }

    .container { padding: 16px; }

    .match-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--live);
      color: white;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: bold;
    }
    .thumbnail {
      width: 100%;
      height: 220px;
      object-fit: cover;
      position: relative;
    }
    .card-body {
      padding: 16px;
    }
    .match-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .score {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      margin: 8px 0;
    }
    .time {
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .analyst-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      margin-top: 12px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .video-placeholder {
      height: 220px;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 1rem;
      text-align: center;
      padding: 20px;
    }
    button#refreshBtn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 700;
      margin: 10px auto 20px;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sportsnap PRO</h1>
    <p class="subtitle">⚽ LIVE Scores & Highlights</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-sport="football">Football</div>
    <div class="tab" data-sport="cricket">Cricket</div>
    <div class="tab" data-sport="basketball">Basketball</div>
    <div class="tab" data-sport="tennis">Tennis</div>
  </div>

  <div class="container">
    <button id="refreshBtn">🔄 Refresh All Matches</button>
    <div id="matchesContainer"></div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    let currentSport = 'football';

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentSport = tab.dataset.sport;
        loadMatches();
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', loadMatches);

    function getDemoMatches(sport) {
      const base = {
        football: [
          { title: "Real Madrid vs Barcelona", competition: "La Liga", score: "2 - 1", time: "67'", status: "Live", thumbnail: "https://picsum.photos/id/1015/600/300" },
          { title: "Manchester City vs Arsenal", competition: "Premier League", score: "3 - 0", time: "Full Time", status: "FT", thumbnail: "https://picsum.photos/id/237/600/300" }
        ],
        cricket: [
          { title: "India vs Australia", competition: "Border-Gavaskar Trophy", score: "289/6", time: "Day 2", status: "Live", thumbnail: "https://picsum.photos/id/1018/600/300" },
          { title: "RCB vs CSK", competition: "IPL 2026", score: "167/4", time: "18.3 ov", status: "Live", thumbnail: "https://picsum.photos/id/102/600/300" }
        ],
        basketball: [
          { title: "Lakers vs Warriors", competition: "NBA", score: "98 - 87", time: "Q3", status: "Live", thumbnail: "https://picsum.photos/id/201/600/300" }
        ],
        tennis: [
          { title: "Djokovic vs Alcaraz", competition: "Wimbledon", score: "2 - 1", time: "Set 3", status: "Live", thumbnail: "https://picsum.photos/id/133/600/300" }
        ]
      };
      return base[sport] || base.football;
    }

    function loadMatches() {
      const container = document.getElementById('matchesContainer');
      container.innerHTML = '';

      const matches = getDemoMatches(currentSport);

      matches.forEach(match => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
          <div style="position:relative;">
            <img src="${match.thumbnail}" class="thumbnail" alt="match">
            ${match.status === 'Live' ? `<div class="live-badge">LIVE</div>` : ''}
          </div>
          <div class="card-body">
            <div class="match-title">${match.title}</div>
            <div style="color:#94a3b8; font-size:0.95rem;">${match.competition}</div>
            <div class="score">${match.score}</div>
            <div class="time">${match.time} • ${match.status}</div>
            
            <div class="video-placeholder">
              <div>
                <p>🎥 Highlight Video</p>
                <p style="font-size:0.9rem; margin-top:8px;">This highlight is currently unavailable</p>
                <p style="font-size:0.85rem; color:#64748b;">(Real videos will appear after API integration)</p>
              </div>
            </div>

            <button class="analyst-btn" onclick="showAI summary('${match.title}')">
              🤖 AI Analyst
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function showAI summary(title) {
      alert(`🤖 AI Analyst for: ${title}\n\nKey Moments:\n• Dramatic comeback in second half\n• Star player scored a brace\n• Tactical masterclass by coach\n\nFull AI Summary coming soon with real integration!`);
    }

    // Initial load
    window.onload = loadMatches;

    // Auto refresh
    setInterval(loadMatches, 45000);
  </script>
</body>
</html>
