     <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sportsnap PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #16a34a;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

.tabs button {
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: #1e293b;
  color: white;
}

.tabs button.active {
  background: #f59e0b;
}

.match-card {
  background: #1e293b;
  border-radius: 16px;
  padding: 15px;
  margin: 12px;
}

.live {
  color: red;
  font-weight: bold;
}

.teams {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.team {
  display: flex;
  align-items: center;
  gap: 8px;
}

.team img {
  width: 25px;
}

.score {
  font-weight: bold;
}

.status {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>Sportsnap PRO ⚽</header>

<div class="tabs">
  <button onclick="loadSport('football')">Football</button>
  <button onclick="loadSport('cricket')">Cricket</button>
  <button onclick="loadSport('basketball')">Basketball</button>
  <button onclick="loadSport('tennis')">Tennis</button>
</div>

<div id="matches">Loading...</div>

<script>

// ===== TEAM LOGOS =====
const logos = {
  "India": "https://flagcdn.com/w40/in.png",
  "Australia": "https://flagcdn.com/w40/au.png",
  "England": "https://flagcdn.com/w40/gb.png",
  "CSK": "https://upload.wikimedia.org/wikipedia/en/2/2e/Chennai_Super_Kings_Logo.svg",
  "MI": "https://upload.wikimedia.org/wikipedia/en/2/2c/Mumbai_Indians_Logo.svg"
};

function getLogo(team) {
  return logos[team] || "https://via.placeholder.com/25";
}

// ===== MAIN LOAD FUNCTION =====
async function loadSport(sport) {
  document.getElementById("matches").innerHTML = "Loading...";

  try {

    let data = [];

    // ===== FOOTBALL (Scorebat) =====
    if (sport === "football") {
      let res = await fetch("https://www.scorebat.com/video-api/v3/");
      let json = await res.json();

      data = json.response.map(m => ({
        team1: m.title.split(" - ")[0],
        team2: m.title.split(" - ")[1],
        score1: "",
        score2: "",
        status: m.competition,
      }));
    }

    // ===== CRICKET (FREE FALLBACK) =====
    if (sport === "cricket") {
      data = [
        {
          team1: "CSK",
          team2: "MI",
          score1: "167/8",
          score2: "142/4",
          status: "GT needs 26 runs in 12 balls"
        }
      ];
    }

    // ===== BASKETBALL =====
    if (sport === "basketball") {
      data = [
        {
          team1: "Lakers",
          team2: "Warriors",
          score1: "102",
          score2: "99",
          status: "4th Quarter"
        }
      ];
    }

    // ===== TENNIS =====
    if (sport === "tennis") {
      data = [
        {
          team1: "Djokovic",
          team2: "Nadal",
          score1: "2",
          score2: "1",
          status: "Set 4"
        }
      ];
    }

    render(data);

  } catch (err) {
    document.getElementById("matches").innerHTML = "API Error ❌";
  }
}

// ===== RENDER FUNCTION =====
function render(data) {
  let html = "";

  if (!data.length) {
    html = "No matches found ❌";
  }

  data.forEach(m => {
    html += `
      <div class="match-card">

        <div class="live">LIVE</div>

        <div class="teams">
          <div class="team">
            <img src="${getLogo(m.team1)}">
            ${m.team1}
          </div>
          <div class="score">${m.score1}</div>
        </div>

        <div class="teams">
          <div class="team">
            <img src="${getLogo(m.team2)}">
            ${m.team2}
          </div>
          <div class="score">${m.score2}</div>
        </div>

        <div class="status">${m.status}</div>

      </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

// AUTO LOAD
loadSport("football");

</script>

</body>
</html>
