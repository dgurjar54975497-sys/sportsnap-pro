<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sportsnap V26 | New API Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffcc; --bg: #05080a; --card: rgba(20, 25, 35, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; padding-bottom: 80px; overflow-x: hidden; }

        /* V19 Premium Header */
        header { 
            padding: 15px 20px; background: rgba(5,8,10,0.9); 
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }

        .container { padding: 15px; }

        /* V19 Glass Cards */
        .card { 
            background: var(--card); border-radius: 20px; padding: 18px; 
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .match-type { font-size: 0.65rem; font-weight: 600; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; opacity: 0.8; }
        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .team-name { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.95rem; }
        .score { font-size: 1.1rem; font-weight: 800; color: #fff; }
        .status { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 12px; padding-top: 10px; font-size: 0.75rem; color: #00ffcc; font-weight: 500; }

        /* Features Styling */
        .view { display: none; animation: slideUp 0.4s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* V19 Bottom Nav */
        .nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(10, 14, 20, 0.95); 
            display: flex; justify-content: space-around; padding: 12px 5px 25px; 
            border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
        }
        .nav-item { color: #666; text-align: center; font-size: 0.65rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
        .nav-icon { font-size: 1.3rem; margin-bottom: 4px; }

        /* Transfer UI */
        .transfer-card { background: linear-gradient(135deg, #00ffcc22, #000); border: 1px solid var(--accent); padding: 25px; text-align: center; border-radius: 20px; }
        .btn-action { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; margin-top: 15px; }

        #api-indicator { font-size: 0.6rem; background: #222; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SPORTSNAP</div>
        <div id="api-indicator">FETCHING...</div>
    </header>

    <div class="container">
        <!-- MATCHES (LIVE) -->
        <div id="v-matches" class="view active">
            <h3 style="margin-bottom:15px; font-size: 1rem;">Live Scoreboard</h3>
            <div id="match-list">
                <!-- Matches will load here -->
            </div>
        </div>

        <!-- CLUBS (V19 Feature) -->
        <div id="v-clubs" class="view">
            <h3 style="margin-bottom:15px;">Sports Communities</h3>
            <div class="card">
                <div class="team-row">
                    <div class="team-name">🛡️ <b>IPL Global Club</b></div>
                    <button class="btn-action" style="width:auto; padding:5px 15px; margin:0;">JOIN</button>
                </div>
                <p style="font-size:0.8rem; color:#888; margin-top:10px;">Discuss matches with 50k+ fans worldwide.</p>
            </div>
        </div>

        <!-- NEWS -->
        <div id="v-news" class="view">
            <h3 style="margin-bottom:15px;">Latest Highlights</h3>
            <div class="card" style="padding:0; overflow:hidden;">
                <img src="https://img.youtube.com/vi/P2vjM2ZJ6pQ/maxresdefault.jpg" style="width:100%;">
                <div style="padding:15px;">
                    <b style="color:var(--accent);">VIDEO:</b> India vs Australia Final Highlights
                </div>
            </div>
        </div>

        <!-- TICKETS & TRANSFER -->
        <div id="v-tickets" class="view">
            <h3 style="margin-bottom:15px;">Transfer & Tickets</h3>
            <div class="transfer-card">
                <p style="font-size: 0.7rem; letter-spacing: 2px;">WALLET BALANCE</p>
                <h1 style="font-size: 2.5rem; margin: 10px 0;">₹4,250</h1>
                <button class="btn-action" onclick="this.innerText='Opening UPI...'">SEND MONEY</button>
                <button class="btn-action" style="background:transparent; color:#fff; border:1px solid #333;">BOOK TICKETS</button>
            </div>
        </div>
    </div>

    <!-- V19 Navigation -->
    <nav class="nav">
        <div class="nav-item active" onclick="nav('v-matches', this)"><div class="nav-icon">🏏</div>MATCHES</div>
        <div class="nav-item" onclick="nav('v-clubs', this)"><div class="nav-icon">🛡️</div>CLUBS</div>
        <div class="nav-item" onclick="nav('v-news', this)"><div class="nav-icon">📰</div>NEWS</div>
        <div class="nav-item" onclick="nav('v-tickets', this)"><div class="nav-icon">💳</div>WALLET</div>
    </nav>

    <script>
        // NEW API: No more "Network Error"
        const NEW_API_URL = "https://api.cricketdata.org/v1/currentMatches?apikey=e39b71a0-9c0c-4b8a-80c6-c849f3bee991";

        function nav(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function getLiveScores() {
            const container = document.getElementById('match-list');
            const indicator = document.getElementById('api-indicator');

            try {
                // Hum proxy use kar rahe hain takki browser block na kare
                const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(NEW_API_URL);
                const response = await fetch(proxyUrl);
                const raw = await response.json();
                const result = JSON.parse(raw.contents);

                if(result.status === "success" && result.data.length > 0) {
                    indicator.innerText = "ONLINE";
                    indicator.style.color = "#00ffcc";
                    render(result.data);
                } else {
                    throw new Error("API Limit");
                }
            } catch (e) {
                indicator.innerText = "OFFLINE (DEMO)";
                indicator.style.color = "orange";
                loadBackupMatches();
            }
        }

        function render(matches) {
            let html = '';
            matches.slice(0, 5).forEach(m => {
                const score1 = m.score[0] ? m.score[0].r + '/' + m.score[0].w : 'Yet to bat';
                html += `
                <div class="card">
                    <div class="match-type">${m.matchType} • ${m.venue}</div>
                    <div class="team-row">
                        <div class="team-name">🏏 ${m.teams[0]}</div>
                        <div class="score">${score1}</div>
                    </div>
                    <div class="team-row">
                        <div class="team-name">🏏 ${m.teams[1]}</div>
                        <div class="score"></div>
                    </div>
                    <div class="status">● ${m.status}</div>
                </div>`;
            });
            document.getElementById('match-list').innerHTML = html;
        }

        function loadBackupMatches() {
            const backup = [
                { t1: "INDIA", t2: "SOUTH AFRICA", s1: "342/6", stat: "India won by 42 runs", type: "T20 WORLD CUP" },
                { t1: "MI", t2: "CSK", s1: "186/4 (18.2)", stat: "MI need 12 from 10 balls", type: "IPL 2026" },
                { t1: "RCB", t2: "Kolkata", s1: "210/2", stat: "Match in progress", type: "IPL 2026" }
            ];
            let html = '';
            backup.forEach(m => {
                html += `
                <div class="card">
                    <div class="match-type">${m.type}</div>
                    <div class="team-row">
                        <div class="team-name">🏏 ${m.t1}</div>
                        <div class="score">${m.s1}</div>
                    </div>
                    <div class="team-row">
                        <div class="team-name">🏏 ${m.t2}</div>
                        <div class="score"></div>
                    </div>
                    <div class="status">● ${m.stat}</div>
                </div>`;
            });
            document.getElementById('match-list').innerHTML = html;
        }

        getLiveScores();
        setInterval(getLiveScores, 60000); // 1 minute refresh
    </script>
</body>
</html>
