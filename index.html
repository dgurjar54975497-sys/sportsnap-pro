<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sportsnap V25 | No-Error Edition</title>
    <style>
        :root { --accent: #00ffcc; --glass: rgba(25, 30, 45, 0.8); --bg: #05080a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; padding-bottom: 80px; }
        
        /* Glass UI Styles */
        header { padding: 20px; background: rgba(5,8,10,0.9); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
        
        .container { padding: 15px; }
        .card { background: var(--glass); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Match UI */
        .team-row { display: flex; justify-content: space-between; margin: 10px 0; align-items: center; }
        .team-meta { display: flex; align-items: center; gap: 10px; }
        .t-logo { width: 30px; height: 30px; border-radius: 50%; background: #222; }
        .score { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .status-tag { font-size: 0.7rem; color: #aaa; text-align: center; border-top: 1px solid #333; padding-top: 8px; margin-top: 5px; }

        /* Nav System */
        .view { display: none; }
        .view.active { display: block; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0e14; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
        .nav-item { color: #555; font-size: 0.7rem; text-align: center; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--accent); }

        /* News & Community */
        .news-img { width: 100%; height: 150px; background: #222; border-radius: 10px; margin-bottom: 10px; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SPORTSNAP</div>
        <div id="net-status" style="font-size: 0.7rem; color: #00ffcc;">● LIVE</div>
    </header>

    <div class="container">
        <!-- MATCHES VIEW -->
        <div id="v-matches" class="view active">
            <div id="match-list">
                <div class="card">Loading real-time data...</div>
            </div>
        </div>

        <!-- CLUBS VIEW -->
        <div id="v-clubs" class="view">
            <h3>Community Clubs</h3>
            <div class="card">
                <div class="team-row">
                    <b>IPL Fans Chat</b>
                    <button style="background:var(--accent); border:none; padding:5px 10px; border-radius:5px;">JOIN</button>
                </div>
                <p style="font-size:0.8rem; color:#888;">1,200 members talking about today's match.</p>
            </div>
        </div>

        <!-- TICKETS VIEW -->
        <div id="v-tickets" class="view">
            <h3>Book Tickets</h3>
            <div class="card">
                <p>IPL 2026: MI vs CSK</p>
                <h2 style="margin:10px 0;">₹1,499</h2>
                <button onclick="alert('Payment Gateway Opening...')" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:8px; font-weight:bold;">TRANSFER NOW</button>
            </div>
        </div>

        <!-- NEWS VIEW -->
        <div id="v-news" class="view">
            <h3>Latest News</h3>
            <div class="card">
                <img src="https://via.placeholder.com/400x200/111/00ffcc?text=Cricket+News" class="news-img">
                <b>Hardik Pandya back in form?</b>
                <p style="font-size:0.8rem; color:#888;">Exclusive interview after the big win...</p>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="show('v-matches', this)">🏟️<br>Matches</div>
        <div class="nav-item" onclick="show('v-clubs', this)">🛡️<br>Clubs</div>
        <div class="nav-item" onclick="show('v-news', this)">📰<br>News</div>
        <div class="nav-item" onclick="show('v-tickets', this)">🎫<br>Tickets</div>
    </nav>

    <script>
        const API_KEY = "e39b71a0-9c0c-4b8a-80c6-c849f3bee991";

        function show(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // Error Handling & API Fetch
        async function fetchScores() {
            const list = document.getElementById('match-list');
            const status = document.getElementById('net-status');

            try {
                // Proxy use kar rahe hain takki Network Error na aaye
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.cricketdata.org/v1/currentMatches?apikey=' + API_KEY)}`);
                
                if (!response.ok) throw new Error('Network fail');
                
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents);

                if (data.status === "success" && data.data.length > 0) {
                    renderMatches(data.data);
                    status.innerHTML = "● LIVE DATA";
                } else {
                    throw new Error('API Limit');
                }
            } catch (error) {
                console.log("Using Backup Data due to network error");
                status.innerHTML = "● OFFLINE MODE (Backup)";
                status.style.color = "orange";
                useBackupData();
            }
        }

        function renderMatches(matches) {
            let html = '';
            matches.slice(0, 5).forEach(m => {
                html += `
                <div class="card">
                    <div style="font-size:0.7rem; color:var(--accent)">${m.matchType.toUpperCase()}</div>
                    <div class="team-row">
                        <div class="team-meta"><span>🏏</span> ${m.teams[0]}</div>
                        <div class="score">${m.score[0] ? m.score[0].r + '/' + m.score[0].w : 'Yet to Bat'}</div>
                    </div>
                    <div class="team-row">
                        <div class="team-meta"><span>🏏</span> ${m.teams[1]}</div>
                        <div class="score"></div>
                    </div>
                    <div class="status-tag">${m.status}</div>
                </div>`;
            });
            document.getElementById('match-list').innerHTML = html;
        }

        function useBackupData() {
            const demo = [
                { teams: ["India", "Australia"], score: ["284/4"], status: "India won by 6 wickets", type: "ODI" },
                { teams: ["CSK", "MI"], score: ["192/3"], status: "CSK need 12 runs in 6 balls", type: "IPL" }
            ];
            let html = '';
            demo.forEach(m => {
                html += `<div class="card">
                    <div style="font-size:0.7rem; color:var(--accent)">${m.type} (DEMO)</div>
                    <div class="team-row"><b>${m.teams[0]}</b> <span class="score">${m.score[0]}</span></div>
                    <div class="team-row"><b>${m.teams[1]}</b></div>
                    <div class="status-tag">${m.status}</div>
                </div>`;
            });
            document.getElementById('match-list').innerHTML = html;
        }

        fetchScores();
        setInterval(fetchScores, 60000); // Har 1 min me refresh
    </script>
</body>
</html>
