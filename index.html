<!DOCTYPE html>
<html>
<head>
  <title>Sportsnap PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1d3a;
      color: white;
    }

    header {
      background: #08142a;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px;
    }

    .tabs button {
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #1e2f50;
      color: white;
    }

    .tabs button.active {
      background: orange;
      color: black;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: #1e2f50;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .teams {
      font-weight: bold;
      font-size: 16px;
    }

    .score {
      margin-top: 5px;
      font-size: 14px;
      color: #00ffcc;
    }

    .status {
      font-size: 12px;
      color: #ccc;
    }
  </style>

</head>

<body>

<header>Sportsnap ⚽ LIVE</header>

<div class="tabs">
  <button class="active" onclick="loadFootball()">Football</button>
  <button onclick="loadIPL()">IPL</button>
</div>

<div class="container" id="result">
  Click a tab to load matches
</div>

<script>

async function loadFootball() {
  document.getElementById("result").innerHTML = "Loading Football...";

  try {
    const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328");
    const data = await res.json();

    let html = "";

    data.events.forEach(match => {
      html += `
        <div class="card">
          <div class="teams">${match.strEvent}</div>
          <div class="score">Date: ${match.dateEvent}</div>
          <div class="status">League Match</div>
        </div>
      `;
    });

    document.getElementById("result").innerHTML = html;

  } catch (e) {
    document.getElementById("result").innerHTML = "Error loading ❌";
  }
}

async function loadIPL() {
  document.getElementById("result").innerHTML = "IPL coming soon 🚧";

  // future: cricket API here
}

</script>

</body>
</html>
