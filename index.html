<!DOCTYPE html>
<html>
<head>
  <title>Sportsnap PRO</title>
  <style>
    body {
      background:#0b1e3c;
      color:white;
      font-family:sans-serif;
      text-align:center;
    }
    h1 { margin-top:20px; }
    button {
      background:orange;
      border:none;
      padding:10px 20px;
      border-radius:10px;
      cursor:pointer;
      margin:10px;
    }
    .card {
      background:#1c2f4a;
      margin:15px;
      padding:15px;
      border-radius:12px;
    }
    img { width:100%; border-radius:10px; }
  </style>
</head>

<body>

<h1>Sportsnap ⚽ PRO</h1>
<button onclick="load()">🔄 Refresh</button>

<div id="matches">Loading...</div>

<script>
async function load(){
  document.getElementById("matches").innerHTML="Loading...";

  try {
    let res = await fetch("/api/matches");
    let data = await res.json();

    if(!data || data.length===0){
      document.getElementById("matches").innerHTML="❌ No matches found";
      return;
    }

    let html="";
    data.slice(0,10).forEach(m=>{
      html+=`
        <div class="card">
          <h3>${m.title}</h3>
          <p>${m.competition}</p>
          <img src="${m.thumbnail}">
          <div>${m.video}</div>
        </div>
      `;
    });

    document.getElementById("matches").innerHTML=html;

  } catch(e){
    document.getElementById("matches").innerHTML="❌ Error loading data";
  }
}

load();
</script>

</body>
</html>
