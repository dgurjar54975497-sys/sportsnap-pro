<!DOCTYPE html>
<html>
<head>
  <title>Sportsnap Live</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 15px;
      background: black;
      margin: 0;
      color: #22c55e;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: orange;
      font-weight: bold;
    }

    #tabs {
      text-align: center;
    }

    #result {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .live {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Sportsnap ⚽ LIVE</h1>

<div id="tabs">
  <button onclick="loadFootball()">Football</button>
  <button onclick="loadIPL()">IPL</button>
</div>

<div id="result">Loading...</div>

<script>

// ⚽ Football (free API)
async function loadFootball() {
  const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328");
  const data = await res.json();

  let html = "<h2>Football Matches</h2>";

  data.events.forEach(m => {
    html += `
      <div class="card">
        <b>${m.strEvent}</b><br>
        
        📅 ${m.dateEvent}
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

</body>
  </html>
