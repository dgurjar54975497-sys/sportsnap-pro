<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportsnap PRO | Final Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #020617;
            --glass: rgba(15, 23, 42, 0.9);
            --neon-blue: #00f2fe;
            --neon-purple: #8b5cf6;
            --gold: #fbbf24;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--obsidian); color: #fff; overflow-x: hidden; }

        /* --- Premium Color Grading --- */
        .app-shell {
            background: radial-gradient(circle at 0% 0%, rgba(0, 242, 254, 0.08) 0, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.08) 0, transparent 40%);
            min-height: 100vh;
        }

        header {
            padding: 20px; background: var(--glass); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Orbitron'; color: var(--neon-blue); letter-spacing: 2px; }

        /* --- Functional Tabs --- */
        .nav-tabs { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: rgba(0,0,0,0.2); }
        .tab { 
            padding: 10px 25px; border-radius: 12px; background: #1e293b; color: #64748b; 
            cursor: pointer; font-weight: 800; border: 1px solid transparent; white-space: nowrap;
        }
        .tab.active { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); }

        .main-content { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* --- Match Card --- */
        .card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; padding: 20px; margin-bottom: 20px; position: relative;
        }
        .badge-live { background: var(--success); color: #000; padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; position: absolute; top: 20px; right: 20px; }
        
        .score-row { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .score-row img { width: 55px; height: 55px; object-fit: contain; }
        .score-main { font-family: 'Orbitron'; font-size: 1.8rem; font-weight: 900; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; text-align: center; }
        .btn-p { background: var(--neon-blue); color: #000; }
        .btn-s { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        /* --- Functional Community --- */
        .community-box { background: #0f172a; border-radius: 20px; padding: 20px; margin-top: 10px; }
        .chat-display { height: 150px; overflow-y: auto; border-left: 2px solid var(--neon-purple); padding-left: 15px; margin-bottom: 15px; }
        .chat-msg { margin-bottom: 10px; font-size: 0.85rem; }
        .chat-msg span { color: var(--neon-purple); font-weight: 800; }

        /* --- Modal Overlays --- */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; 
            display: none; flex-direction: column; padding: 20px; justify-content: center;
        }
        .close-btn { align-self: flex-end; font-size: 2rem; margin-bottom: 20px; cursor: pointer; }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 15px; border: 2px solid var(--neon-blue); }

        /* Ticket Map */
        .seat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .seat { height: 45px; background: #334155; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; }
        .seat.selected { background: var(--success); color: #000; box-shadow: 0 0 15px var(--success); }
    </style>
</head>
<body>
    <div class="app-shell">
        <header>
            <div class="logo">SPORTSNAP <span>PRO</span></div>
            <div style="font-size: 0.7rem; background: var(--gold); color: #000; padding: 5px 10px; border-radius: 8px; font-weight: 900;">👑 ELITE ACCESS</div>
        </header>

        <nav class="nav-tabs" id="sportTabs">
            <div class="tab active" onclick="switchSport('IPL', this)">IPL 2026</div>
            <div class="tab" onclick="switchSport('FOOTBALL', this)">EURO 2026</div>
            <div class="tab" onclick="switchSport('NBA', this)">NBA</div>
        </nav>

        <div class="main-content">
            <div id="content-feed"></div>

            <div class="community-box">
                <h4 style="color: var(--gold); margin-bottom: 15px; font-size: 0.9rem;">🔥 TEAM COMMUNITY CLUB</h4>
                <div class="chat-display" id="chat">
                    <div class="chat-msg"><span>System:</span> Welcome to the Club. Join the prediction commotion below!</div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chatInput" placeholder="Your prediction..." style="flex:1; background: #020617; border: 1px solid #1e293b; border-radius: 10px; padding: 12px; color: #fff;">
                    <button onclick="postChat()" class="btn btn-p" style="padding: 10px 20px;">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <div id="videoModal" class="overlay">
        <div class="close-btn" onclick="closeModal('videoModal')">&times;</div>
        <div id="videoContainer"></div>
    </div>

    <div id="ticketModal" class="overlay">
        <div class="close-btn" onclick="closeModal('ticketModal')">&times;</div>
        <h2 style="text-align: center; color: var(--neon-blue); font-family: 'Orbitron';">SELECT STADIUM SEATS</h2>
        <div class="seat-grid" id="seat-grid"></div>
        <button class="btn btn-p" style="width: 100%;" onclick="confirmTicket()">CONFIRM BOOKING</button>
    </div>

    <script>
        const DATA = {
            IPL: [
                { id: 1, team1: "MI", team2: "RCB", s1: "184/3", s2: "110/2", status: "14.2 Overs", live: true, highlights: "https://www.youtube.com/embed/PjRkE1z2U-o" },
                { id: 2, team1: "CSK", team2: "Kolkata", s1: "210/6", s2: "211/4", status: "Finished", live: false, highlights: "https://www.youtube.com/embed/l44vHwV_i_M" }
            ],
            FOOTBALL: [
                { id: 3, team1: "India", team2: "Kuwait", s1: "2", s2: "1", status: "88'", live: true, highlights: "https://www.youtube.com/embed/PjRkE1z2U-o" }
            ]
        };

        function render(sport) {
            const feed = document.getElementById('content-feed');
            feed.innerHTML = DATA[sport].map(m => `
                <div class="card">
                    ${m.live ? '<div class="badge-live">LIVE</div>' : ''}
                    <div style="font-size: 0.7rem; color: #64748b; font-weight: 800;">${sport} PREMIER LEAGUE</div>
                    <div class="score-row">
                        <div style="text-align:center;"><div style="font-weight:900;">${m.team1}</div></div>
                        <div class="score-main">${m.s1} - ${m.s2}</div>
                        <div style="text-align:center;"><div style="font-weight:900;">${m.team2}</div></div>
                    </div>
                    <div style="text-align:center; color: var(--neon-blue); font-weight: 800; font-size: 0.8rem; margin-bottom: 15px;">${m.status}</div>
                    <div class="btn-group">
                        <button class="btn btn-s" onclick="openTickets()">🎟️ Book Tickets</button>
                        <button class="btn btn-p" onclick="playVideo('${m.highlights}')">▶ Highlights</button>
                    </div>
                </div>
            `).join('');
        }

        function switchSport(sport, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render(sport);
        }

        // --- Video Logic ---
        function playVideo(url) {
            document.getElementById('videoContainer').innerHTML = `<iframe src="${url}?autoplay=1" allow="autoplay; fullscreen"></iframe>`;
            document.getElementById('videoModal').style.display = 'flex';
        }

        // --- Ticket Logic ---
        function openTickets() {
            const grid = document.getElementById('seat-grid');
            grid.innerHTML = '';
            for(let i=1; i<=20; i++) {
                grid.innerHTML += `<div class="seat" onclick="this.classList.toggle('selected')">${i}</div>`;
            }
            document.getElementById('ticketModal').style.display = 'flex';
        }

        function confirmTicket() {
            const selected = document.querySelectorAll('.seat.selected').length;
            if(selected === 0) return alert("Select a seat first!");
            alert(`✅ ${selected} Ticket(s) Booked Successfully! E-ticket sent to your profile.`);
            closeModal('ticketModal');
        }

        // --- Chat Logic ---
        function postChat() {
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="chat-msg"><span>You:</span> ${input.value}</div>`;
            chat.scrollTop = chat.scrollHeight;
            input.value = '';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            if(id === 'videoModal') document.getElementById('videoContainer').innerHTML = '';
        }

        // Init
        render('IPL');
    </script>
</body>
    </html>
