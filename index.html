<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO - IPL 2026</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0a0f1c;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1e2937;
      padding: 1rem;
      text-align: center;
    }
    h1 { font-size: 2rem; margin: 0; }
    .subtitle { color: #22c55e; }

    .tabs {
      display: flex;
      background: #111827;
      padding: 12px;
      overflow-x: auto;
      gap: 10px;
    }
    .tab {
      padding: 10px 20px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab.active {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    .container { padding: 16px; }

    .match-card {
      background: #1a2338;
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .thumbnail {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ef4444;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .card-body {
      padding: 16px;
    }
    .match-title {
      font-size: 1.2rem;
      font-weight: bold;
    }
    .score {
      font-size: 1.6rem;
      color: #22c55e;
      font-weight: bold;
      margin: 10px 0;
    }
    button {
      background: #22c55e;
      color: black;
      border: none;
      padding: 14px 30px;
      border-radius: 50px;
      font-weight: bold;
      margin: 20px auto;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sportsnap PRO</h1>
    <p class="subtitle">🏏 IPL 2026 LIVE</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchSport('ipl')">IPL 2026</div>
    <div class="tab" onclick="switchSport('football')">Football</div>
  </div>

  <div class="container">
    <button onclick="loadMatches()">🔄 Refresh Matches</button>
    <div id="matchesContainer"></div>
  </div>

  <script>
    let currentSport = 'ipl';

    function switchSport(sport) {
      currentSport = sport;
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.toggle('active', tab.textContent.includes(sport.toUpperCase()));
      });
      loadMatches();
    }

    function loadMatches() {
      const container = document.getElementById('matchesContainer');
      container.innerHTML = '<p style="text-align:center; padding:50px; color:#94a3b8;">Loading IPL matches...</p>';

      setTimeout(() => {
        container.innerHTML = '';

        const matches = [
          {
            title: "Royal Challengers Bengaluru vs Chennai Super Kings",
            competition: "IPL 2026 • Match 34",
            score: "RCB 189/5 (19.2 ov)",
            time: "Needs 9 runs in 4 balls",
            status: "LIVE"
          },
          {
            title: "Mumbai Indians vs Kolkata Knight Riders",
            competition: "IPL 2026 • Match 35",
            score: "MI 167/8",
            time: "KKR chasing",
            status: "LIVE"
          }
        ];

        matches.forEach(match => {
          const cardHTML = `
            <div class="match-card">
              <div style="position:relative;">
                <img src="https://picsum.photos/id/1018/800/400" class="thumbnail" alt="IPL">
                <div class="live-badge">${match.status}</div>
              </div>
              <div class="card-body">
                <div class="match-title">${match.title}</div>
                <div style="color:#94a3b8;">${match.competition}</div>
                <div class="score">${match.score}</div>
                <div style="color:#94a3b8;">${match.time}</div>
                <button onclick="alert('🤖 AI Analyst: RCB looking strong in death overs!')">AI Analyst</button>
              </div>
            </div>
          `;
          container.innerHTML += cardHTML;
        });
      }, 800);
    }

    // Load on start
    window.onload = loadMatches;
  </script>
</body>
</html>
