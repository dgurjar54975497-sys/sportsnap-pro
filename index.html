    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO ⚽ LIVE</title>
  <style>
    :root {
      --bg: #0a0f1c;
      --card: #1a2338;
      --accent: #22c55e;
      --text: #e2e8f0;
      --secondary: #64748b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, #1e2937, #334155);
      padding: 1.2rem 1rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: white;
    }
    .subtitle {
      font-size: 0.95rem;
      color: var(--accent);
      margin-top: 4px;
    }
    .tabs {
      display: flex;
      overflow-x: auto;
      background: #111827;
      padding: 12px 8px;
      gap: 8px;
      position: sticky;
      top: 60px;
      z-index: 90;
      scrollbar-width: none;
    }
    .tab {
      padding: 10px 20px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .tab.active {
      background: var(--accent);
      color: #000;
      box-shadow: 0 4px 12px rgba(34,197,94,0.4);
    }
    .container { padding: 16px; }
    .match-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .match-card:hover { transform: translateY(-4px); }
    .thumbnail {
      width: 100%;
      height: 210px;
      object-fit: cover;
    }
    .card-body {
      padding: 16px;
    }
    .match-title {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .competition {
      color: var(--secondary);
      font-size: 0.95rem;
      margin-bottom: 12px;
    }
    .video-container {
      position: relative;
      padding-top: 56.25%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 12px;
    }
    .video-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: block;
      margin: 20px auto;
      box-shadow: 0 4px 15px rgba(34,197,94,0.3);
    }
    .loading, .error {
      text-align: center;
      padding: 40px 20px;
      font-size: 1.1rem;
    }
    .loading { color: #94a3b8; }
    .error { color: #f87171; }
  </style>
</head>
<body>

  <header>
    <h1>Sportsnap PRO</h1>
    <p class="subtitle">⚽ LIVE Scores & Highlights</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-sport="football">Football</div>
    <div class="tab" data-sport="cricket">Cricket</div>
    <div class="tab" data-sport="basketball">Basketball</div>
    <div class="tab" data-sport="tennis">Tennis</div>
  </div>

  <div class="container">
    <button id="refreshBtn">🔄 Refresh All Matches</button>
    <div id="loading" class="loading">Fetching live matches...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="matchesContainer"></div>
  </div>

  <script>
    let currentSport = 'football';

    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentSport = tab.dataset.sport;
        loadMatches();
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', loadMatches);

    async function loadMatches() {
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const container = document.getElementById('matchesContainer');

      loading.style.display = 'block';
      errorEl.style.display = 'none';
      container.innerHTML = '';

      try {
        const res = await fetch(`/api/matches?sport=${currentSport}`);
        const data = await res.json();

        if (data.matches && data.matches.length > 0) {
          data.matches.forEach(match => {
            const card = document.createElement('div');
            card.className = 'match-card';
            card.innerHTML = `
              <img src="${match.thumbnail || 'https://via.placeholder.com/600x300/1e2937/22c55e?text=Sportsnap+PRO'}" class="thumbnail" alt="Highlight">
              <div class="card-body">
                <div class="match-title">${match.title}</div>
                <div class="competition">${match.competition}</div>
                ${match.embed ? `
                  <div class="video-container">
                    ${match.embed}
                  </div>
                ` : `<p style="color:#94a3b8;text-align:center;padding:16px 0;">Highlight video coming soon</p>`}
              </div>
            `;
            container.appendChild(card);
          });
        } else {
          container.innerHTML = `<p class="error">No live matches available for ${currentSport} at the moment.</p>`;
        }
      } catch (err) {
        errorEl.textContent = "Failed to load data. Please check connection and refresh.";
        errorEl.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    // Auto refresh every 40 seconds
    setInterval(() => {
      if (document.visibilityState === 'visible') loadMatches();
    }, 40000);

    // Initial load
    window.onload = () => loadMatches();
  </script>
</body>
</html>
