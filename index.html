<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO - IPL 2026</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0a0f1c;
      color: #e2e8f0;
    }
    header {
      background: linear-gradient(#1e2937, #334155);
      padding: 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { font-size: 2rem; margin: 0; }
    .subtitle { color: #22c55e; }

    .tabs {
      display: flex;
      background: #111827;
      padding: 12px 8px;
      gap: 8px;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 20px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active {
      background: #22c55e;
      color: black;
    }

    .container { padding: 16px; }

    .match-card {
      background: #1a2338;
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .thumbnail {
      width: 100%;
      height: 210px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ef4444;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
    }
    .card-body {
      padding: 16px;
    }
    .match-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 12px 0;
    }
    .team {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }
    .team-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }
    .score {
      font-size: 1.8rem;
      font-weight: 800;
      color: #22c55e;
    }
    button {
      background: #22c55e;
      color: black;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: bold;
      margin: 15px auto;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sportsnap PRO</h1>
    <p class="subtitle">🏏 IPL 2026 LIVE</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="loadIPL()">IPL 2026</div>
    <div class="tab" onclick="loadCommunity()">Community</div>
  </div>

  <div class="container" id="mainContainer"></div>

  <script>
    function loadIPL() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `<button onclick="loadIPL()">🔄 Refresh Matches</button>`;

      const matches = [
        {
          team1: "CSK",
          logo1: "🦁",
          team2: "GT",
          logo2: "⚡",
          score1: "167/8",
          score2: "142/4",
          detail: "GT needs 26 runs in 12 balls",
          status: "LIVE",
          venue: "Narendra Modi Stadium"
        },
        {
          team1: "RCB",
          logo1: "🔴",
          team2: "CSK",
          logo2: "🦁",
          score1: "189/5",
          score2: "",
          detail: "RCB batting • 19.2 overs",
          status: "LIVE",
          venue: "M. Chinnaswamy Stadium"
        }
      ];

      matches.forEach(match => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
          <div style="position:relative;">
            <img src="https://picsum.photos/id/1018/800/400" class="thumbnail" alt="IPL">
            <div class="live-badge">${match.status}</div>
          </div>
          <div class="card-body">
            <div class="team-row">
              <div class="team">
                <span class="team-logo">${match.logo1}</span>
                <span>${match.team1}</span>
              </div>
              <div class="score">${match.score1}</div>
            </div>
            <div class="team-row">
              <div class="team">
                <span class="team-logo">${match.logo2}</span>
                <span>${match.team2}</span>
              </div>
              <div class="score">${match.score2 || '-'}</div>
            </div>
            <div style="color:#94a3b8; margin-top:8px;">${match.detail}</div>
            <div style="color:#94a3b8; font-size:0.9rem;">${match.venue}</div>

            <button onclick="alert('🤖 AI Analyst:\\n\\n• ${match.team1} batting strongly\\n• ${match.team2} under pressure in death overs\\n• Predicted winner: ${match.team1}')">
              🤖 AI Analyst
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function loadCommunity() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `
        <h2 style="margin:20px 0 15px; text-align:center;">IPL Teams Community</h2>
        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); gap:12px;">
          ${[
            {name:"CSK", emoji:"🦁"}, 
            {name:"MI", emoji:"🏴‍☠️"}, 
            {name:"RCB", emoji:"🔴"}, 
            {name:"KKR", emoji:"🟣"}, 
            {name:"GT", emoji:"⚡"}, 
            {name:"SRH", emoji:"☀️"}, 
            {name:"PBKS", emoji:"🏹"}, 
            {name:"DC", emoji:"🟥"}, 
            {name:"RR", emoji:"🦁"}, 
            {name:"LSG", emoji:"🦁"}
          ].map(team => `
            <div onclick="joinTeam('${team.name}')" style="background:#1f2937; padding:12px; border-radius:12px; text-align:center; cursor:pointer;">
              <div style="font-size:2.2rem; margin-bottom:8px;">${team.emoji}</div>
              <div style="font-weight:600;">${team.name}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function joinTeam(team) {
      alert(`✅ You joined ${team} Community!\n\nDiscuss matches, share predictions & chat with fans.`);
    }

    // Initial Load
    window.onload = loadIPL;
  </script>
</body>
</html>
