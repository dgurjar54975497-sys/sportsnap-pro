<!DOCTYPE html>
<html>
<head>
  <title>SportSnap PRO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0A0E1A;
      color: #F0F4FF;
      font-family: 'Arial', sans-serif;
      padding: 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #1E2D45;
    }
    
    h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .sport-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 10px 20px;
      border: 2px solid #1E2D45;
      background: transparent;
      color: #8A9BB5;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    button.active {
      border-color: #00D4FF;
      color: #00D4FF;
      background: rgba(0, 212, 255, 0.1);
    }
    
    button:hover {
      border-color: #00D4FF;
      color: #00D4FF;
    }
    
    .matches-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    
    .match-card {
      background: #111827;
      border: 1px solid #1E2D45;
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s;
    }
    
    .match-card:hover {
      background: #151D2E;
      border-color: #00D4FF;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }
    
    .badge {
      display: inline-block;
      background: rgba(255, 61, 87, 0.2);
      color: #FF3D57;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    
    .match-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .score {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 15px;
      padding: 15px;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 10px;
    }
    
    .team {
      text-align: center;
    }
    
    .team-name {
      font-size: 12px;
      color: #8A9BB5;
      margin-bottom: 5px;
    }
    
    .team-score {
      font-size: 24px;
      font-weight: 900;
      color: #00D4FF;
    }
    
    .status {
      font-size: 12px;
      color: #4A5568;
      text-align: center;
      margin-top: 10px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #8A9BB5;
    }
    
    .error {
      background: rgba(255, 61, 87, 0.1);
      border: 1px solid #FF3D57;
      color: #FF3D57;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SportSnap PRO ⚡</h1>
    <div class="sport-selector">
      <button class="sport-btn active" data-sport="cricket">🏏 Cricket</button>
      <button class="sport-btn" data-sport="football">⚽ Football</button>
      <button class="sport-btn" data-sport="basketball">🏀 Basketball</button>
      <button class="sport-btn" data-sport="tennis">🎾 Tennis</button>
    </div>
  </div>

  <div id="error-container"></div>
  <div id="matches-container" class="matches-container"></div>

  <script>
    let selectedSport = 'cricket';

    const sportButtons = document.querySelectorAll('.sport-btn');
    sportButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        sportButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSport = btn.dataset.sport;
        fetchMatches();
      });
    });

    async function fetchMatches() {
      const container = document.getElementById('matches-container');
      const errorContainer = document.getElementById('error-container');
      
      container.innerHTML = '<div class="loading">⏳ Loading matches...</div>';
      errorContainer.innerHTML = '';

      try {
        // अगर Vercel deployed है तो यह use करो:
        const response = await fetch(`/api/scores?sport=${selectedSport}`);
        
        if (!response.ok) throw new Error('API Error');
        const data = await response.json();

        if (!data || data.length === 0) {
          container.innerHTML = `
            <div class="loading">
              No ${selectedSport} matches currently. Check back soon! 🏟️
            </div>
          `;
          return;
        }

        container.innerHTML = data.map(match => `
          <div class="match-card">
            <div class="badge">🔴 LIVE</div>
            <div class="match-title">${match.team1} vs ${match.team2}</div>
            <div class="score">
              <div class="team">
                <div class="team-name">${match.team1}</div>
                <div class="team-score">${match.score1 || '-'}</div>
              </div>
              <div style="font-size: 12px; color: #8A9BB5;">VS</div>
              <div class="team">
                <div class="team-name">${match.team2}</div>
                <div class="team-score">${match.score2 || '-'}</div>
              </div>
            </div>
            <div class="status">${match.status || 'Live'}</div>
          </div>
        `).join('');
      } catch (error) {
        errorContainer.innerHTML = `
          <div class="error">
            ⚠️ Error loading matches: ${error.message}. 
            Please check your connection and try again.
          </div>
        `;
        container.innerHTML = '';
      }
    }

    // जब page load हो तो matches fetch करो
    fetchMatches();

    // हर 30 seconds में refresh करो (live scores के लिए)
    setInterval(fetchMatches, 30000);
  </script>
</body>
      </html>
