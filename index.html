<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO - IPL 2026</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0a0f1c;
      color: #e2e8f0;
    }
    header {
      background: linear-gradient(#1e2937, #334155);
      padding: 1.2rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { font-size: 2.1rem; margin: 0; }
    .subtitle { color: #22c55e; font-size: 1.05rem; }

    .tabs {
      display: flex;
      background: #111827;
      padding: 12px;
      gap: 10px;
      overflow-x: auto;
    }
    .tab {
      padding: 12px 24px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active {
      background: #22c55e;
      color: black;
    }

    .container { padding: 16px; }

    .match-card {
      background: #1a2338;
      border-radius: 16px;
      margin-bottom: 24px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .thumbnail {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ef4444;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .card-body {
      padding: 18px;
    }
    .match-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .score {
      font-size: 1.7rem;
      color: #22c55e;
      font-weight: 800;
      margin: 12px 0;
    }
    .detail {
      color: #94a3b8;
      font-size: 1rem;
    }
    button {
      background: #22c55e;
      color: black;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: bold;
      margin: 20px auto;
      display: block;
    }
    .ai-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      width: 100%;
      margin-top: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sportsnap PRO</h1>
    <p class="subtitle">🏏 IPL 2026 • LIVE Scores & Highlights</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="loadIPL()">IPL 2026</div>
    <div class="tab" onclick="loadOther()">Other Sports</div>
  </div>

  <div class="container">
    <button onclick="loadIPL()">🔄 Refresh IPL Matches</button>
    <div id="matchesContainer"></div>
  </div>

  <script>
    function loadIPL() {
      const container = document.getElementById('matchesContainer');
      container.innerHTML = '';

      const matches = [
        {
          title: "Royal Challengers Bengaluru vs Chennai Super Kings",
          competition: "IPL 2026 • Match 34",
          score: "RCB 189/5 (19.2 ov)",
          detail: "RCB needs 9 runs in 4 balls • Virat 87*",
          status: "LIVE"
        },
        {
          title: "Mumbai Indians vs Kolkata Knight Riders",
          competition: "IPL 2026 • Match 35",
          score: "MI 167/8",
          detail: "KKR chasing 168 • 18.3 overs",
          status: "LIVE"
        }
      ];

      matches.forEach(match => {
        const cardHTML = `
          <div class="match-card">
            <div style="position:relative;">
              <img src="https://picsum.photos/id/1018/800/400" class="thumbnail" alt="IPL Match">
              <div class="live-badge">${match.status}</div>
            </div>
            <div class="card-body">
              <div class="match-title">${match.title}</div>
              <div style="color:#94a3b8;">${match.competition}</div>
              <div class="score">${match.score}</div>
              <div class="detail">${match.detail}</div>
              
              <button class="ai-btn" onclick="showAI('${match.title}')">
                🤖 AI Match Analyst
              </button>
            </div>
          </div>
        `;
        container.innerHTML += cardHTML;
      });
    }

    function loadOther() {
      const container = document.getElementById('matchesContainer');
      container.innerHTML = `
        <div style="text-align:center; padding:80px 20px; color:#94a3b8;">
          <p>Football, Basketball & Tennis matches</p>
          <p style="margin-top:20px;">Coming soon with real API</p>
        </div>
      `;
    }

    function showAI(title) {
      alert(`🤖 AI Analyst for ${title}\n\n• Strong batting performance\n• Key wickets in middle overs\n• Current momentum with batting side\n\nFull ball-by-ball analysis coming soon!`);
    }

    // Initial load
    window.onload = loadIPL;
  </script>
</body>
</html>
