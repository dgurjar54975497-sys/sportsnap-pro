    <!DOCTYPE html>
<html>
<head>
<title>Sportsnap Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  background: black;
}

/* Tabs */
.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

.tab {
  padding: 8px 14px;
  background: #1e293b;
  border-radius: 20px;
  cursor: pointer;
}

.tab.active {
  background: orange;
  color: black;
}

/* Match Card */
.match {
  background: #1e293b;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
}

.team {
  font-weight: bold;
}

.score {
  color: #22c55e;
  margin-top: 5px;
}

/* Button */
button {
  background: orange;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  margin: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<header>Sportsnap ⚽ LIVE</header>

<div class="tabs">
  <div class="tab active" onclick="load('soccer')">Football</div>
  <div class="tab" onclick="load('cricket')">Cricket</div>
  <div class="tab" onclick="load('basketball')">Basketball</div>
  <div class="tab" onclick="load('tennis')">Tennis</div>
</div>

<center>
<button onclick="load(current)">🔄 Refresh</button>
</center>

<div id="matches"></div>

<script>
let current = "soccer";

async function load(sport) {
  current = sport;
  document.getElementById("matches").innerHTML = "Loading...";

  try {
    // FREE API (no key)
    let res = await fetch(`/api/sports?sport=${sport}`);
    let data = await res.json();

    let matches = data.response;

    let html = "";

    matches.slice(0,20).forEach(m => {
      html += `
      <div class="match">
        <div class="team">${m.title}</div>
        <div class="score">${m.competition}</div>
        <a href="${m.matchviewUrl}" target="_blank">▶ Watch</a>
      </div>
      `;
    });

    document.getElementById("matches").innerHTML = html;

  } catch (e) {
    document.getElementById("matches").innerHTML =
      "❌ Error loading data";
  }
}

// auto load
<script>

let current = "soccer";

async function load(sport) {
  current = sport;
  document.getElementById("matches").innerHTML = "Loading... ⏳";

  try {
    let res = await fetch(`/api/sports?sport=${sport}`);
    let data = await res.json();

    let html = "";

    if (!data || data.length === 0) {
      html = "❌ No data available";
    } else {
      data.slice(0, 15).forEach(m => {
        html += `
          <div class="match">
            <div class="team">${m.title}</div>
            <div class="score">${m.competition || m.score || ""}</div>
            ${m.matchviewUrl ? `<a href="${m.matchviewUrl}" target="_blank">▶ Highlights</a>` : ""}
          </div>
        `;
      });
    }

    document.getElementById("matches").innerHTML = html;

  } catch (err) {
    document.getElementById("matches").innerHTML = "❌ Error loading data";
    console.error(err);
  }
}

// page load पर auto run
load("soccer");


</script>

</body>
</html>
