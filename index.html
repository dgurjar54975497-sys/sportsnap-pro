        <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportsnap LIVE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1d3a;
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
}

.tabs button {
  padding: 8px 14px;
  border: none;
  border-radius: 20px;
  background: #2c3e50;
  color: white;
}

.tabs .active {
  background: orange;
}

#matches {
  padding: 10px;
}

.card {
  background: #1c2f4a;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
}

a {
  color: #00d4ff;
  text-decoration: none;
}
</style>
</head>

<body>

<header>Sportsnap ⚽ LIVE</header>

<div class="tabs">
  <button onclick="load('soccer')" class="active">Football</button>
  <button onclick="load('cricket')">Cricket</button>
  <button onclick="load('basketball')">Basketball</button>
  <button onclick="load('tennis')">Tennis</button>
</div>

<div style="text-align:center;">
  <button onclick="reload()">🔄 Refresh</button>
</div>

<div id="matches">Loading...</div>

<script>
let current = "soccer";

async function load(sport) {
  current = sport;
  document.getElementById("matches").innerHTML = "Loading...";

  try {
    let res = await fetch(`/api/live?sport=${sport}`);
    let data = await res.json();

    let html = "";

    if (!data || data.length === 0) {
      html = "❌ No matches found";
    } else {
      data.forEach(m => {
        html += `
          <div class="card">
            <h3>${m.title}</h3>
            <p>${m.competition}</p>
            <p>${m.time}</p>
            <p>${m.status}</p>
            ${m.url ? `<a href="${m.url}" target="_blank">▶ Watch / Highlights</a>` : ""}
          </div>
        `;
      });
    }

    document.getElementById("matches").innerHTML = html;

  } catch (err) {
    document.getElementById("matches").innerHTML = "❌ Error loading data";
    console.error(err);
  }
}

function reload(){
  load(current);
}

// auto load
load("soccer");
</script>

</body>
</html>
