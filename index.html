<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO - IPL 2026</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0a0f1c;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* Top Header - Cricbuzz Style */
    .top-bar {
      background: #1e8e3e;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.9rem; font-weight: 700; }
    .get-app {
      background: white;
      color: #1e8e3e;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
    }

    /* Main Tabs */
    .main-tabs {
      display: flex;
      background: #111827;
      padding: 10px 8px;
      gap: 8px;
      overflow-x: auto;
    }
    .main-tab {
      padding: 10px 20px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 600;
    }
    .main-tab.active {
      background: #22c55e;
      color: black;
    }

    .container { padding: 16px; }

    .match-card {
      background: #1a2338;
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .thumbnail {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ef4444;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
    }
    .card-body {
      padding: 16px;
    }
    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
    }
    .team {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }
    .team-logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }
    .score {
      font-size: 1.7rem;
      font-weight: 800;
      color: #22c55e;
    }

    /* Community */
    .community-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .team-card {
      background: #1f2937;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #334155;
    }
    .nav-item {
      text-align: center;
      color: #94a3b8;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .nav-item.active { color: #22c55e; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">Sportsnap PRO</div>
    <div class="get-app">GET APP</div>
  </div>

  <!-- Main Tabs -->
  <div class="main-tabs">
    <div class="main-tab active" onclick="showSection('matches')">Matches</div>
    <div class="main-tab" onclick="showSection('community')">Community</div>
  </div>

  <div class="container" id="mainContent"></div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showSection('matches')">🏏 Matches</div>
    <div class="nav-item" onclick="showSection('community')">👥 Community</div>
    <div class="nav-item" onclick="alert('Videos coming soon')">🎥 Videos</div>
  </div>

  <script>
    const teams = [
      {name: "CSK", logo: "🦁", color: "#facc15"},
      {name: "MI", logo: "🏴‍☠️", color: "#1e40af"},
      {name: "RCB", logo: "🔴", color: "#b91c1c"},
      {name: "KKR", logo: "🟣", color: "#6b21a8"},
      {name: "GT", logo: "⚡", color: "#1e40af"},
      {name: "SRH", logo: "☀️", color: "#f59e0b"},
      {name: "PBKS", logo: "🏹", color: "#b91c1c"},
      {name: "DC", logo: "🟥", color: "#1e40af"},
      {name: "RR", logo: "🦁", color: "#facc15"},
      {name: "LSG", logo: "🦁", color: "#22c55e"}
    ];

    function showSection(section) {
      const content = document.getElementById('mainContent');

      if (section === 'matches') {
        content.innerHTML = `
          <h2 style="margin:20px 0 15px; color:#22c55e;">IPL 2026 Live Matches</h2>
          <div class="match-card">
            <div style="position:relative;">
              <img src="https://picsum.photos/id/1018/800/400" class="thumbnail">
              <div class="live-badge">● LIVE</div>
            </div>
            <div class="card-body">
              <div class="team-row">
                <div class="team">
                  <span class="team-logo" style="background:#facc15">🦁</span>
                  <span>CSK</span>
                </div>
                <div class="score">167/8</div>
              </div>
              <div class="team-row">
                <div class="team">
                  <span class="team-logo" style="background:#1e40af">⚡</span>
                  <span>GT</span>
                </div>
                <div class="score">142/4</div>
              </div>
              <p style="color:#ef4444; margin-top:8px;">GT needs 26 runs in 12 balls</p>
              <button onclick="alert('🤖 AI Analyst: GT bowlers under pressure in death overs!')">🤖 AI Analyst</button>
            </div>
          </div>
        `;
      } 
      else if (section === 'community') {
        content.innerHTML = `
          <h2 style="margin:20px 0 15px; text-align:center;">Join IPL Team Communities</h2>
          <div class="community-grid">
            ${teams.map(t => `
              <div class="team-card" onclick="joinTeam('${t.name}')">
                <div class="team-logo" style="background:\( {t.color}"> \){t.logo}</div>
                <div style="font-weight:600;">${t.name}</div>
              </div>
            `).join('')}
          </div>
        `;
      }
    }

    function joinTeam(team) {
      alert(`✅ You joined ${team} Community!\n\nDiscuss live matches, share predictions & chat with other ${team} fans.`);
    }

    // Initial Load
    window.onload = () => showSection('matches');
  </script>
</body>
      </html>
