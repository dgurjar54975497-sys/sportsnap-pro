  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO</title>
  <style>
    :root {
      --green: #1e8e3e;
      --dark: #0a0f1c;
      --card: #1a2338;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--dark);
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* Top Header */
    .top-header {
      background: var(--green);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.95rem; font-weight: 700; }
    .get-app {
      background: white;
      color: var(--green);
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: bold;
    }

    /* Main Tabs */
    .main-tabs {
      display: flex;
      background: #111827;
      padding: 10px 8px;
      gap: 6px;
      overflow-x: auto;
    }
    .main-tab {
      padding: 10px 18px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .main-tab.active {
      background: #22c55e;
      color: black;
    }

    .container { padding: 16px; }

    .match-card {
      background: var(--card);
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .thumbnail {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ef4444;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: bold;
    }
    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
    }
    .team {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }
    .team-logo {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      overflow: hidden;
    }
    .team-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .score {
      font-size: 1.7rem;
      font-weight: 800;
      color: #22c55e;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #334155;
    }
    .nav-item {
      text-align: center;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .nav-item.active { color: #22c55e; }
  </style>
</head>
<body>

  <!-- Top Header -->
  <div class="top-header">
    <div class="logo">Sportsnap PRO</div>
    <div class="get-app">GET APP</div>
  </div>

  <!-- Main Tabs -->
  <div class="main-tabs">
    <div class="main-tab active" onclick="showSection('home')">Home</div>
    <div class="main-tab" onclick="showSection('matches')">Matches</div>
    <div class="main-tab" onclick="showSection('series')">Series</div>
    <div class="main-tab" onclick="showSection('videos')">Videos</div>
    <div class="main-tab" onclick="showSection('news')">News</div>
  </div>

  <div class="container" id="mainContent"></div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showSection('home')">🏠 Home</div>
    <div class="nav-item" onclick="showSection('matches')">🏏 Matches</div>
    <div class="nav-item" onclick="showSection('community')">👥 Community</div>
    <div class="nav-item" onclick="showSection('videos')">🎥 Videos</div>
  </div>

  <script>
    const iplTeams = [
      { name: "CSK", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/800px-Chennai_Super_Kings_Logo.svg.png" },
      { name: "MI", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/8/8d/Mumbai_Indians_Logo.svg/800px-Mumbai_Indians_Logo.svg.png" },
      { name: "RCB", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4c/Royal_Challengers_Bengaluru_Logo.svg/800px-Royal_Challengers_Bengaluru_Logo.svg.png" },
      { name: "KKR", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4c/Kolkata_Knight_Riders_Logo.svg/800px-Kolkata_Knight_Riders_Logo.svg.png" },
      { name: "GT", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/0/0e/Gujarat_Titans_Logo.svg/800px-Gujarat_Titans_Logo.svg.png" },
      { name: "SRH", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Sunrisers_Hyderabad_Logo.svg/800px-Sunrisers_Hyderabad_Logo.svg.png" },
      { name: "PBKS", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2e/Punjab_Kings_Logo.svg/800px-Punjab_Kings_Logo.svg.png" },
      { name: "DC", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2d/Delhi_Capitals_Logo.svg/800px-Delhi_Capitals_Logo.svg.png" },
      { name: "RR", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/6/6f/Rajasthan_Royals_Logo.svg/800px-Rajasthan_Royals_Logo.svg.png" },
      { name: "LSG", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2e/Lucknow_Super_Giants_Logo.svg/800px-Lucknow_Super_Giants_Logo.svg.png" }
    ];

    function showSection(section) {
      const content = document.getElementById('mainContent');

      if (section === 'home') {
        content.innerHTML = `<h2 style="margin:30px 0; text-align:center; color:#22c55e;">Welcome to Sportsnap PRO</h2>`;
      } 
      else if (section === 'matches') {
        content.innerHTML = `
          <h2 style="margin:20px 0 15px; color:#22c55e;">IPL 2026 Live Matches</h2>
          <div class="match-card">
            <div style="position:relative;">
              <img src="https://picsum.photos/id/1018/800/400" class="thumbnail">
              <div class="live-badge">● LIVE</div>
            </div>
            <div class="card-body">
              <div class="team-row">
                <div class="team">
                  <span class="team-logo"><img src="${iplTeams[0].logo}" alt="CSK"></span>
                  <span>CSK</span>
                </div>
                <div class="score">167/8</div>
              </div>
              <div class="team-row">
                <div class="team">
                  <span class="team-logo"><img src="${iplTeams[4].logo}" alt="GT"></span>
                  <span>GT</span>
                </div>
                <div class="score">142/4</div>
              </div>
              <div class="detail">GT needs 26 runs in 12 balls • Narendra Modi Stadium</div>
              <button onclick="alert('🤖 AI Analyst: CSK looking strong!')">🤖 AI Analyst</button>
            </div>
          </div>
        `;
      } 
      else if (section === 'community') {
        content.innerHTML = `
          <h2 style="margin:20px 0 15px; text-align:center;">IPL Teams Community</h2>
          <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap:14px;">
            ${iplTeams.map(team => `
              <div class="team-card" onclick="joinTeam('${team.name}')">
                <div class="team-logo"><img src="\( {team.logo}" alt=" \){team.name}"></div>
                <div style="font-weight:700; margin-top:8px;">${team.name}</div>
              </div>
            `).join('')}
          </div>
        `;
      } 
      else {
        content.innerHTML = `<p style="padding:100px 20px; text-align:center; color:#94a3b8;">${section.charAt(0).toUpperCase() + section.slice(1)} section coming soon...</p>`;
      }
    }

    function joinTeam(team) {
      alert(`✅ You joined ${team} Community!\nDiscuss matches, share predictions with other ${team} fans.`);
    }

    // Initial Load
    window.onload = () => showSection('matches');
  </script>
</body>
</html>
