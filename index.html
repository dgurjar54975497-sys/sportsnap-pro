<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sportsnap | Next-Gen Sports Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505; --card: rgba(20, 20, 20, 0.8);
            --accent: #00ffcc; --accent-dark: #008877;
            --text: #ffffff; --text-muted: #888;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .view { display: none; padding-top: 70px; padding-bottom: 80px; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .snap-y-container { height: calc(100vh - 150px); overflow-y: scroll; scroll-snap-type: y mandatory; }
        .snap-item { scroll-snap-align: start; height: 100%; position: relative; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass flex justify-between items-center px-4 py-3 border-b border-white/10">
        <div class="flex items-center gap-2">
            <div class="font-black text-2xl tracking-tighter italic text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-green-500">ADS</div>
            <span class="font-bold text-lg font-poppins">Sportsnap</span>
        </div>
        <div class="flex gap-4 items-center">
            <i class="fa-solid fa-bell text-lg"></i>
            <img src="https://ui-avatars.com/api/?name=Pro&background=00ffcc" class="w-8 h-8 rounded-full border-2 border-cyan-500">
        </div>
    </header>

    <!-- Main Views -->
    <main id="view-home" class="view active px-4">
        <h2 class="text-xl font-bold mb-4 font-poppins">Live Scoreboard</h2>
        <div id="live-scores" class="space-y-4">
            <!-- Populated by JS -->
        </div>

        <h2 class="text-xl font-bold mt-8 mb-4 font-poppins">Trending Threads</h2>
        <div id="threads-container" class="space-y-4"></div>
    </main>

    <main id="view-reels" class="view">
        <div class="snap-y-container" id="reels-feed">
            <!-- Reels populated here -->
        </div>
        <button onclick="createPostModal()" class="fixed bottom-20 right-6 bg-cyan-500 p-4 rounded-full shadow-2xl z-50 text-black">
            <i class="fa-solid fa-plus text-2xl"></i>
        </button>
    </main>

    <main id="view-clubs" class="view px-4">
        <h2 class="text-2xl font-black mb-6">Explore Communities</h2>
        <div class="grid grid-cols-2 gap-4" id="clubs-grid"></div>
        <div class="mt-8 p-6 glass rounded-2xl">
            <h3 class="font-bold text-lg mb-2 text-cyan-400">Creator Monetization</h3>
            <p class="text-sm text-gray-400 mb-4">Earn from your sports analysis & highlights.</p>
            <button class="bg-white text-black font-bold w-full py-3 rounded-xl hover:bg-cyan-400 transition">View Dashboard</button>
        </div>
    </main>

    <main id="view-tickets" class="view px-4">
        <h2 class="text-2xl font-black mb-6">Upcoming Events</h2>
        <div id="tickets-container" class="space-y-6"></div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full glass flex justify-around py-4 z-50">
        <div class="nav-item active text-cyan-400" onclick="switchView('home', this)"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item" onclick="switchView('reels', this)"><i class="fa-solid fa-clapperboard"></i></div>
        <div class="nav-item" onclick="switchView('clubs', this)"><i class="fa-solid fa-shield-halved"></i></div>
        <div class="nav-item" onclick="switchView('tickets', this)"><i class="fa-solid fa-ticket"></i></div>
    </nav>

    <!-- Modal for Post Creation -->
    <div id="post-modal" class="fixed inset-0 bg-black/90 z-[100] hidden p-6 flex items-center justify-center">
        <div class="glass w-full p-6 rounded-2xl">
            <h2 class="text-xl font-bold mb-4">Create New Reel/Post</h2>
            <textarea id="post-input" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 mb-4" placeholder="Share your sports thought..."></textarea>
            <div class="flex gap-4">
                <button onclick="savePost()" class="flex-1 bg-cyan-500 text-black font-bold py-3 rounded-xl">Post</button>
                <button onclick="closeModal()" class="flex-1 bg-white/10 text-white font-bold py-3 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // --- Central State ---
        const appData = {
            scores: [
                { match: "RCB vs GT", status: "Live", score: "161-5", detail: "2nd Innings (18.2 ov)" },
                { match: "ENG vs IND", status: "Upcoming", score: "TBA", detail: "Tomorrow, 7:00 PM" }
            ],
            posts: [
                { user: "virat_fan", text: "What a spectacular win tonight! RCB forever!", likes: "12k" }
            ],
            clubs: [
                { name: "Cricket Legends", members: "1.2M" },
                { name: "Football Hub", members: "800k" }
            ]
        };

        // --- Core Functions ---
        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('text-cyan-400'));
            el.classList.add('text-cyan-400');
        }

        // --- Real-time Post Logic ---
        function createPostModal() { document.getElementById('post-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('post-modal').classList.add('hidden'); }
        
        function savePost() {
            const val = document.getElementById('post-input').value;
            if(!val) return;
            const newPost = { user: "You", text: val, likes: "0" };
            appData.posts.unshift(newPost);
            renderThreads();
            closeModal();
            document.getElementById('post-input').value = '';
        }

        // --- Renderers ---
        function renderThreads() {
            const container = document.getElementById('threads-container');
            container.innerHTML = appData.posts.map(p => `
                <div class="glass p-4 rounded-xl">
                    <div class="font-bold text-sm text-cyan-400">@${p.user}</div>
                    <p class="text-sm mt-2">${p.text}</p>
                    <div class="text-xs text-gray-500 mt-3"><i class="fa-solid fa-heart mr-1"></i> ${p.likes} Likes</div>
                </div>
            `).join('');
        }

        function renderScores() {
            const container = document.getElementById('live-scores');
            container.innerHTML = appData.scores.map(s => `
                <div class="glass p-4 rounded-xl flex justify-between items-center">
                    <div>
                        <div class="font-bold">${s.match}</div>
                        <div class="text-xs text-gray-400">${s.detail}</div>
                    </div>
                    <div class="bg-red-500/20 text-red-500 px-2 py-1 rounded text-xs font-bold animate-pulse">${s.status}</div>
                </div>
            `).join('');
        }

        // --- Initialize ---
        function initApp() {
            renderScores();
            renderThreads();
            // In a production app, this is where you call:
            // fetch('https://api.your-sports-provider.com/...')
            console.log("App Initialized. API connections ready for implementation.");
        }

        initApp();
    </script>
</body>
            </html>
