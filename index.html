<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportSnap PRO - Live Sports Scores</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0A0E1A;
      color: #F0F4FF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: linear-gradient(135deg, #0A0E1A 0%, #111827 100%);
      border-bottom: 1px solid #1E2D45;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 32px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, #00D4FF 0%, #7C3AED 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-auth {
      padding: 8px 16px;
      background: #1E2D45;
      border: none;
      color: #00D4FF;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-auth:hover {
      background: #2A3D55;
      transform: translateY(-2px);
    }

    .btn-signup {
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      color: white !important;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    /* STORIES */
    .stories-container {
      display: flex;
      gap: 12px;
      padding: 16px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid #1E2D45;
    }

    .stories-container::-webkit-scrollbar { display: none; }

    .story {
      min-width: 70px;
      width: 70px;
      height: 100px;
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .story:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid #1E2D45;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 8px 16px;
      background: transparent;
      border: 2px solid #1E2D45;
      color: #8A9BB5;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      white-space: nowrap;
      font-size: 13px;
    }

    .tab:hover {
      border-color: #00D4FF;
      color: #00D4FF;
    }

    .tab.active {
      border-color: #00D4FF;
      color: #00D4FF;
      background: rgba(0, 212, 255, 0.1);
    }

    /* CONTAINER */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 100px;
    }

    .section-title {
      padding: 20px 0 12px;
      font-size: 12px;
      color: #8A9BB5;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #FF3D57;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* MATCHES GRID */
    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .match-card {
      background: linear-gradient(135deg, #111827 0%, #151D2E 100%);
      border: 1px solid #1E2D45;
      border-radius: 16px;
      padding: 16px;
      transition: all 0.3s;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    .match-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #00D4FF, #7C3AED);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .match-card:hover {
      background: linear-gradient(135deg, #151D2E 0%, #1A2438 100%);
      border-color: #00D4FF;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
      transform: translateY(-4px);
    }

    .match-card:hover::before {
      opacity: 1;
    }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .live-badge {
      background: rgba(255, 61, 87, 0.2);
      color: #FF3D57;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.3s;
      padding: 4px 8px;
    }

    .fav-btn:hover {
      transform: scale(1.2);
    }

    .fav-btn.active {
      color: #FF3D57;
    }

    .match-title {
      font-size: 15px;
      color: #F0F4FF;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .score-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 14px;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(0, 212, 255, 0.1);
    }

    .team {
      text-align: center;
      flex: 1;
    }

    .team-name {
      font-size: 12px;
      color: #8A9BB5;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .team-score {
      font-size: 28px;
      font-weight: 900;
      color: #00D4FF;
      line-height: 1;
    }

    .vs {
      padding: 0 10px;
      font-size: 11px;
      color: #4A5568;
      font-weight: 700;
    }

    .match-footer {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #4A5568;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* LOADING & ERROR */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #8A9BB5;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #1E2D45;
      border-top-color: #00D4FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: rgba(255, 61, 87, 0.1);
      border: 1px solid #FF3D57;
      color: #FF3D57;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.95) 0%, #0A0E1A 100%);
      border-top: 1px solid #1E2D45;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 99;
      backdrop-filter: blur(10px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #4A5568;
      font-size: 10px;
      cursor: pointer;
      padding: 8px 12px;
      transition: all 0.3s;
      flex: 1;
      font-weight: 500;
    }

    .nav-item:hover {
      color: #00D4FF;
    }

    .nav-item.active {
      color: #00D4FF;
    }

    .nav-icon {
      font-size: 22px;
      transition: all 0.3s;
    }

    .nav-item.active .nav-icon {
      transform: scale(1.1);
    }

    /* PAGES */
    .page-content {
      display: none;
    }

    .page-content.active {
      display: block;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, #111827 0%, #151D2E 100%);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      border: 1px solid #1E2D45;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-field {
      width: 100%;
      padding: 12px;
      background: #0A0E1A;
      border: 1px solid #1E2D45;
      color: #F0F4FF;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .input-field:focus {
      outline: none;
      border-color: #00D4FF;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 8px;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
    }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: #1E2D45;
      border: none;
      color: #00D4FF;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-secondary:hover {
      background: #2A3D55;
    }

    /* NEWS CARD */
    .news-card {
      background: linear-gradient(135deg, #111827 0%, #151D2E 100%);
      border: 1px solid #1E2D45;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      transition: all 0.3s;
    }

    .news-card:hover {
      border-color: #00D4FF;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
    }

    .news-image {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      border-radius: 8px;
      flex-shrink: 0;
    }

    .news-content {
      flex: 1;
    }

    .news-title {
      font-size: 13px;
      font-weight: 600;
      color: #F0F4FF;
      margin-bottom: 4px;
    }

    .news-desc {
      font-size: 11px;
      color: #8A9BB5;
      line-height: 1.4;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .matches-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="logo-section">
      <div class="logo-icon">🏏</div>
      <div class="logo-text">SportSnap PRO ⚡</div>
    </div>
    <div class="header-right">
      <button class="btn-auth" id="loginBtn" onclick="openLogin()" style="display: none;">Login</button>
      <button class="btn-auth btn-signup" id="signupBtn" onclick="openSignup()" style="display: none;">Sign Up</button>
      <div class="user-avatar" id="userProfile" style="display: none;" title="User Profile">U</div>
    </div>
  </div>

  <!-- STORIES -->
  <div class="stories-container">
    <div class="story">📰</div>
    <div class="story">🎥</div>
    <div class="story">⚽</div>
    <div class="story">🏀</div>
    <div class="story">🎾</div>
    <div class="story">📸</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-sport="cricket">🏏 Cricket</button>
    <button class="tab" data-sport="football">⚽ Football</button>
    <button class="tab" data-sport="basketball">🏀 Basketball</button>
    <button class="tab" data-sport="tennis">🎾 Tennis</button>
    <button class="tab" data-sport="volleyball">🏐 Volleyball</button>
    <button class="tab" data-sport="hockey">🏑 Hockey</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">
    <!-- HOME PAGE -->
    <div class="page-content active" id="homePage">
      <div class="section-title">
        <span class="live-dot"></span>
        LIVE MATCHES
      </div>
      <div id="errorContainer"></div>
      <div id="matchesContainer" class="matches-grid"></div>
    </div>

    <!-- CLUBS PAGE -->
    <div class="page-content" id="clubsPage">
      <div class="section-title">🏆 CLUBS & TEAMS</div>
      <div id="clubsContainer"></div>
    </div>

    <!-- REELS PAGE -->
    <div class="page-content" id="reelsPage">
      <div class="section-title">🎬 REELS</div>
      <div id="reelsContainer"></div>
    </div>

    <!-- TICKETS PAGE -->
    <div class="page-content" id="ticketsPage">
      <div class="section-title">🎟️ TICKETS</div>
      <div id="ticketsContainer"></div>
    </div>

    <!-- NEWS PAGE -->
    <div class="page-content" id="newsPage">
      <div class="section-title">📰 NEWS</div>
      <div id="newsContainer"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" data-page="home">
      <div class="nav-icon">🏠</div>
      <div>Home</div>
    </div>
    <div class="nav-item" data-page="clubs">
      <div class="nav-icon">🏆</div>
      <div>Clubs</div>
    </div>
    <div class="nav-item" data-page="reels">
      <div class="nav-icon">🎬</div>
      <div>Reels</div>
    </div>
    <div class="nav-item" data-page="tickets">
      <div class="nav-icon">🎟️</div>
      <div>Tickets</div>
    </div>
    <div class="nav-item" data-page="news">
      <div class="nav-icon">📰</div>
      <div>News</div>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <div class="modal-title">Login</div>
      <input class="input-field" id="loginEmail" type="email" placeholder="Email">
      <input class="input-field" id="loginPassword" type="password" placeholder="Password">
      <button class="btn-primary" onclick="handleLogin()">Login</button>
      <button class="btn-secondary" onclick="closeLogin()">Cancel</button>
    </div>
  </div>

  <!-- SIGNUP MODAL -->
  <div class="modal" id="signupModal">
    <div class="modal-content">
      <div class="modal-title">Sign Up</div>
      <input class="input-field" id="signupName" type="text" placeholder="Username">
      <input class="input-field" id="signupEmail" type="email" placeholder="Email">
      <input class="input-field" id="signupPassword" type="password" placeholder="Password">
      <button class="btn-primary" onclick="handleSignup()">Create Account</button>
      <button class="btn-secondary" onclick="closeSignup()">Cancel</button>
    </div>
  </div>

  <script>
    let selectedSport = 'cricket';
    let currentUser = null;

    // Modal Functions
    window.openLogin = () => document.getElementById('loginModal').classList.add('active');
    window.closeLogin = () => document.getElementById('loginModal').classList.remove('active');
    window.openSignup = () => document.getElementById('signupModal').classList.add('active');
    window.closeSignup = () => document.getElementById('signupModal').classList.remove('active');

    window.handleLogin = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      if (email && password) {
        currentUser = { email: email };
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('signupBtn').style.display = 'none';
        document.getElementById('userProfile').style.display = 'flex';
        document.getElementById('userProfile').textContent = email.charAt(0).toUpperCase();
        closeLogin();
      }
    };

    window.handleSignup = async () => {
      const email = document.getElementById('signupEmail').value;
      const name = document.getElementById('signupName').value;
      if (email && name) {
        currentUser = { email: email, name: name };
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('signupBtn').style.display = 'none';
        document.getElementById('userProfile').style.display = 'flex';
        document.getElementById('userProfile').textContent = email.charAt(0).toUpperCase();
        closeSignup();
      }
    };

    // Fetch Matches
    async function fetchMatches() {
      const container = document.getElementById('matchesContainer');
      const errorContainer = document.getElementById('errorContainer');
      
      container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading matches...</div>';
      errorContainer.innerHTML = '';

      try {
        const response = await fetch('/api/scores?sport=' + selectedSport);
        const data = await response.json();

        if (!data || data.length === 0) {
          container.innerHTML = '<div class="loading">📭 No matches right now. Check back soon!</div>';
          return;
        }

        container.innerHTML = data.map(match => `
          <div class="match-card">
            <div class="match-header">
              <div class="live-badge">
                <div style="width: 6px; height: 6px; background: #FF3D57; border-radius: 50%; animation: pulse 1s infinite;"></div>
                LIVE
              </div>
              <button class="fav-btn" onclick="toggleFav(this)">🤍</button>
            </div>
            <div class="match-title">${match.team1} vs ${match.team2}</div>
            <div class="score-section">
              <div class="team">
                <div class="team-name">${match.team1}</div>
                <div class="team-score">${match.score1}</div>
              </div>
              <div class="vs">VS</div>
              <div class="team">
                <div class="team-name">${match.team2}</div>
                <div class="team-score">${match.score2}</div>
              </div>
            </div>
            <div class="match-footer">
              <span>⏱️ ${match.status}</span>
              <span>${match.venue || match.league || ''}</span>
            </div>
          </div>
        `).join('');
      } catch (error) {
        errorContainer.innerHTML = '<div class="error">⚠️ Error loading matches: ' + error.message + '</div>';
      }
    }

    window.toggleFav = (btn) => {
      btn.textContent = btn.textContent === '🤍' ? '❤️' : '🤍';
      btn.classList.toggle('active');
    };

    // Sport Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedSport = tab.dataset.sport;
        fetchMatches();
      });
    });

    // Bottom Nav
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.getElementById(item.dataset.page + 'Page').classList.add('active');
      });
    });

    // Initial Load
    fetchMatches();
    setInterval(fetchMatches, 30000);
  </script>
</body>
  </html>
