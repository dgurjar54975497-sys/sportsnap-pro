        <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO ⚽ LIVE</title>
  <style>
    :root {
      --bg: #0a0f1c;
      --card: #1a2338;
      --accent: #22c55e;
      --live: #ef4444;
      --text: #e2e8f0;
      --secondary: #94a3b8;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e2937, #334155);
      padding: 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { font-size: 1.85rem; font-weight: 700; }
    .subtitle { color: var(--accent); font-size: 0.95rem; }

    .tabs {
      display: flex;
      overflow-x: auto;
      background: #111827;
      padding: 12px 8px;
      gap: 8px;
      position: sticky;
      top: 57px;
      z-index: 90;
    }
    .tab {
      padding: 10px 20px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .tab.active {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .container { padding: 16px; }

    .match-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .thumbnail-container {
      position: relative;
    }
    .thumbnail {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--live);
      color: white;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
    }
    .card-body {
      padding: 16px;
    }
    .match-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .competition {
      color: var(--secondary);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }
    .score {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      margin: 8px 0;
    }
    .time {
      color: var(--secondary);
      font-size: 0.95rem;
    }
    .highlight-section {
      margin-top: 12px;
      background: #111827;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      color: #64748b;
    }
    .analyst-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      margin-top: 12px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
    }
    button#refreshBtn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      display: block;
      margin: 20px auto;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sportsnap PRO</h1>
    <p class="subtitle">⚽ LIVE Scores & Highlights</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-sport="football">Football</div>
    <div class="tab" data-sport="cricket">Cricket</div>
    <div class="tab" data-sport="basketball">Basketball</div>
    <div class="tab" data-sport="tennis">Tennis</div>
  </div>

  <div class="container">
    <button id="refreshBtn">🔄 Refresh All Matches</button>
    <div id="matchesContainer"></div>
  </div>

  <script>
    let currentSport = 'football';

    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentSport = tab.dataset.sport;
        loadMatches();
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', loadMatches);

    function getDemoMatches(sport) {
      const data = {
        football: [
          { title: "Real Madrid vs FC Barcelona", competition: "La Liga 2026", score: "2 - 1", time: "67'", status: "Live", thumbnail: "https://picsum.photos/id/1015/800/400" },
          { title: "Manchester City vs Arsenal", competition: "Premier League", score: "3 - 2", time: "FT", status: "FT", thumbnail: "https://picsum.photos/id/237/800/400" }
        ],
        cricket: [
          { title: "India vs Australia", competition: "Border-Gavaskar Trophy", score: "312/7", time: "Day 3", status: "Live", thumbnail: "https://picsum.photos/id/1018/800/400" },
          { title: "RCB vs CSK", competition: "IPL 2026", score: "189/5", time: "19.2 ov", status: "Live", thumbnail: "https://picsum.photos/id/102/800/400" }
        ],
        basketball: [
          { title: "Los Angeles Lakers vs Golden State Warriors", competition: "NBA 2026", score: "112 - 98", time: "Q4", status: "Live", thumbnail: "https://picsum.photos/id/201/800/400" }
        ],
        tennis: [
          { title: "Novak Djokovic vs Carlos Alcaraz", competition: "French Open 2026", score: "2 Sets - 1", time: "Set 3", status: "Live", thumbnail: "https://picsum.photos/id/133/800/400" }
        ]
      };
      return data[sport] || data.football;
    }

    function loadMatches() {
      const container = document.getElementById('matchesContainer');
      container.innerHTML = '';

      const matches = getDemoMatches(currentSport);

      matches.forEach((match, index) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
          <div class="thumbnail-container">
            <img src="\( {match.thumbnail}" class="thumbnail" alt=" \){match.title}">
            ${match.status === 'Live' ? `<div class="live-badge">● LIVE</div>` : ''}
          </div>
          <div class="card-body">
            <div class="match-title">${match.title}</div>
            <div class="competition">${match.competition}</div>
            <div class="score">${match.score}</div>
            <div class="time">${match.time} • ${match.status}</div>

            <div class="highlight-section">
              <p>🎥 Match Highlights</p>
              <p style="font-size:0.9rem; margin-top:8px;">Video highlights will appear here once real API is connected.</p>
              <p style="font-size:0.85rem; color:#64748b;">Currently showing demo mode.</p>
            </div>

            <button class="analyst-btn" onclick="showAISummary('${match.title}')">
              🤖 AI Match Analyst
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function showAISummary(title) {
      const summary = `AI Analysis for ${title}:\n\n• High intensity match\n• Key player performed exceptionally\n• Tactical battle in midfield\n• Expected winner based on current form\n\nFull detailed AI summary coming soon with real integration!`;
      alert(summary);
    }

    // Initial load + Auto refresh
    window.onload = loadMatches;
    setInterval(loadMatches, 40000);
  </script>
</body>
</html>
