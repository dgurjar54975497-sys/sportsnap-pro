<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO - IPL 2026</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f1419;
      color: #e2e8f0;
    }

    /* Top Header - Clean & Professional */
    .top-header {
      background: #1e8e3e;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 1.95rem;
      font-weight: 700;
    }
    .get-app {
      background: white;
      color: #1e8e3e;
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: bold;
    }

    .container { padding: 16px; }

    .match-card {
      background: #1a2338;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .thumbnail {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ef4444;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .card-body {
      padding: 16px;
    }
    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
    }
    .team {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }
    .team-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
    }
    .team-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .score {
      font-size: 1.8rem;
      font-weight: 800;
      color: #22c55e;
    }
    .detail {
      color: #94a3b8;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- Top Header -->
  <div class="top-header">
    <div class="logo">Sportsnap PRO</div>
    <div class="get-app">GET APP</div>
  </div>

  <div class="container">

    <h2 style="margin: 20px 0 15px; color: #22c55e;">IPL 2026 Live Matches</h2>

    <!-- Match 1: CSK vs GT -->
    <div class="match-card">
      <div style="position:relative;">
        <img src="https://picsum.photos/id/1018/800/400" class="thumbnail">
        <div class="live-badge">● LIVE</div>
      </div>
      <div class="card-body">
        <div class="team-row">
          <div class="team">
            <span class="team-logo">
              <img src="https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/800px-Chennai_Super_Kings_Logo.svg.png" alt="CSK">
            </span>
            <span>CSK</span>
          </div>
          <div class="score">167/8</div>
        </div>
        <div class="team-row">
          <div class="team">
            <span class="team-logo">
              <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/0e/Gujarat_Titans_Logo.svg/800px-Gujarat_Titans_Logo.svg.png" alt="GT">
            </span>
            <span>GT</span>
          </div>
          <div class="score">142/4</div>
        </div>
        <div class="detail">GT needs 26 runs in 12 balls • Narendra Modi Stadium</div>
        <button onclick="alert('🤖 AI Analyst: CSK strong position mein hai!')">🤖 AI Analyst</button>
      </div>
    </div>

    <!-- Match 2: RCB vs CSK -->
    <div class="match-card">
      <div style="position:relative;">
        <img src="https://picsum.photos/id/237/800/400" class="thumbnail">
        <div class="live-badge">● LIVE</div>
      </div>
      <div class="card-body">
        <div class="team-row">
          <div class="team">
            <span class="team-logo">
              <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/4c/Royal_Challengers_Bengaluru_Logo.svg/800px-Royal_Challengers_Bengaluru_Logo.svg.png" alt="RCB">
            </span>
            <span>RCB</span>
          </div>
          <div class="score">189/5</div>
        </div>
        <div class="team-row">
          <div class="team">
            <span class="team-logo">
              <img src="https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Chennai_Super_Kings_Logo.svg/800px-Chennai_Super_Kings_Logo.svg.png" alt="CSK">
            </span>
            <span>CSK</span>
          </div>
          <div class="score">-</div>
        </div>
        <div class="detail">RCB batting • 19.2 overs • Chinnaswamy Stadium</div>
        <button onclick="alert('🤖 AI Analyst: RCB death overs mein strong!')">🤖 AI Analyst</button>
      </div>
    </div>

  </div>

</body>
</html>
