            <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO ⚽ LIVE</title>
  <style>
    :root {
      --bg: #0a0f1c;
      --card: #1a2338;
      --accent: #22c55e;
      --live: #ef4444;
      --text: #e2e8f0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e2937, #334155);
      padding: 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { font-size: 1.85rem; font-weight: 700; }
    .subtitle { color: var(--accent); font-size: 0.95rem; }

    .tabs {
      display: flex;
      overflow-x: auto;
      background: #111827;
      padding: 12px 8px;
      gap: 8px;
      position: sticky;
      top: 57px;
      z-index: 90;
    }
    .tab {
      padding: 10px 20px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      background: var(--accent);
      color: #000;
    }

    .container { padding: 16px; }

    .match-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .thumbnail {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px; right: 12px;
      background: var(--live);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .card-body {
      padding: 16px;
    }
    .match-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .score {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      margin: 10px 0;
    }
    .scoreboard {
      background: #111827;
      padding: 12px;
      border-radius: 12px;
      margin: 12px 0;
      font-size: 0.95rem;
    }
    .analyst-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      width: 100%;
      margin-top: 12px;
      cursor: pointer;
    }
    button#refreshBtn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      display: block;
      margin: 20px auto;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sportsnap PRO</h1>
    <p class="subtitle">⚽ IPL 2026 • LIVE Scores & Highlights</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-sport="ipl">IPL 2026</div>
    <div class="tab" data-sport="football">Football</div>
    <div class="tab" data-sport="cricket">Other Cricket</div>
    <div class="tab" data-sport="basketball">Basketball</div>
  </div>

  <div class="container">
    <button id="refreshBtn">🔄 Refresh IPL & Matches</button>
    <div id="matchesContainer"></div>
  </div>

  <script>
    let currentSport = 'ipl';

    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentSport = tab.dataset.sport;
        loadMatches();
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', loadMatches);

    function getIPLDemoMatches() {
      return [
        {
          title: "Royal Challengers Bengaluru vs Chennai Super Kings",
          competition: "IPL 2026 • Match 34",
          score: "RCB 189/5 (19.2 ov)",
          status: "Live",
          time: "RCB needs 12 runs in 5 balls",
          thumbnail: "https://picsum.photos/id/1018/800/400"
        },
        {
          title: "Mumbai Indians vs Kolkata Knight Riders",
          competition: "IPL 2026",
          score: "MI 167/8 • KKR 142/4",
          status: "In Progress",
          time: "KKR winning",
          thumbnail: "https://picsum.photos/id/237/800/400"
        }
      ];
    }

    function loadMatches() {
      const container = document.getElementById('matchesContainer');
      container.innerHTML = '<p style="text-align:center; color:#94a3b8; padding:20px;">Loading IPL 2026 matches...</p>';

      setTimeout(() => {  // Simulate API delay
        container.innerHTML = '';

        const matches = currentSport === 'ipl' ? getIPLDemoMatches() : getOtherDemoMatches(currentSport);

        matches.forEach(match => {
          const card = document.createElement('div');
          card.className = 'match-card';
          card.innerHTML = `
            <div style="position:relative;">
              <img src="\( {match.thumbnail}" class="thumbnail" alt=" \){match.title}">
              ${match.status === 'Live' ? `<div class="live-badge">● LIVE</div>` : ''}
            </div>
            <div class="card-body">
              <div class="match-title">${match.title}</div>
              <div style="color:#94a3b8;">${match.competition}</div>
              <div class="score">${match.score}</div>
              <div style="color:#94a3b8; font-size:0.95rem;">${match.time}</div>

              <div class="scoreboard">
                <strong>Scoreboard:</strong><br>
                ${match.score}<br>
                Current Run Rate: 9.8
              </div>

              <div style="background:#111827; padding:12px; border-radius:8px; margin:12px 0; text-align:center; color:#64748b;">
                🎥 Highlights Video<br>
                <small>Real IPL highlights will load here after API integration</small>
              </div>

              <button class="analyst-btn" onclick="showAISummary('${match.title}')">
                🤖 AI Match Analyst
              </button>
            </div>
          `;
          container.appendChild(card);
        });
      }, 800);
    }

    function getOtherDemoMatches(sport) {
      return [{ title: `${sport.toUpperCase()} Demo Match`, competition: "Demo League", score: "N/A", status: "Upcoming", time: "Coming Soon", thumbnail: "https://picsum.photos/id/201/800/400" }];
    }

    function showAISummary(title) {
      alert(`🤖 AI Analyst for ${title}\n\n• Strong batting performance\n• Key wickets in middle overs\n• Strategic field placement\n\nDetailed ball-by-ball AI summary coming soon!`);
    }

    window.onload = loadMatches;
    setInterval(loadMatches, 45000);
  </script>
</body>
</html>
