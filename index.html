   <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportsnap PRO - IPL 2026</title>
  <style>
    :root {
      --bg: #0a0f1c;
      --header: #1e3a8a;
      --accent: #22c55e;
      --card: #1a2338;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* Top Header like Cricbuzz */
    .top-header {
      background: var(--header);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.8rem; font-weight: 700; }
    .get-app {
      background: white;
      color: #1e3a8a;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
    }

    /* Main Tabs */
    .main-tabs {
      display: flex;
      overflow-x: auto;
      background: #111827;
      padding: 10px 8px;
      gap: 8px;
    }
    .main-tab {
      padding: 10px 18px;
      background: #1f2937;
      border-radius: 50px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 600;
    }
    .main-tab.active {
      background: #22c55e;
      color: black;
    }

    .container { padding: 16px; }

    .match-card {
      background: var(--card);
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .thumbnail {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .live-badge {
      position: absolute;
      top: 12px; right: 12px;
      background: #ef4444;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
    }

    /* Community Section */
    .community-section {
      margin: 20px 0;
    }
    .community-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 12px;
    }
    .team-card {
      background: #1f2937;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
    }
    .team-logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-bottom: 8px;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #334155;
    }
    .nav-item {
      text-align: center;
      color: #94a3b8;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .nav-item.active {
      color: #22c55e;
    }
  </style>
</head>
<body>

  <!-- Top Header -->
  <div class="top-header">
    <div class="logo">Sportsnap PRO</div>
    <div class="get-app">GET APP</div>
  </div>

  <!-- Main Tabs -->
  <div class="main-tabs">
    <div class="main-tab active" onclick="showSection('home')">Home</div>
    <div class="main-tab" onclick="showSection('matches')">Matches</div>
    <div class="main-tab" onclick="showSection('series')">Series</div>
    <div class="main-tab" onclick="showSection('videos')">Videos</div>
    <div class="main-tab" onclick="showSection('news')">News</div>
  </div>

  <div class="container" id="mainContent">
    <!-- Content will load here -->
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showSection('home')">🏠 Home</div>
    <div class="nav-item" onclick="showSection('matches')">🏏 Matches</div>
    <div class="nav-item" onclick="showSection('community')">👥 Community</div>
    <div class="nav-item" onclick="showSection('videos')">🎥 Videos</div>
  </div>

  <script>
    function showSection(section) {
      const content = document.getElementById('mainContent');
      
      if (section === 'home') {
        content.innerHTML = `
          <h2 style="margin:20px 0 10px;">IPL 2026</h2>
          <div style="background:#1a2338; padding:16px; border-radius:16px;">
            <p><strong>37th Match • CSK vs GT</strong></p>
            <p>Gujarat Titans opt to bowl</p>
          </div>
        `;
      } 
      else if (section === 'matches') {
        content.innerHTML = `
          <h2 style="margin:20px 0 10px;">Live & Upcoming Matches</h2>
          <div class="match-card">
            <div style="position:relative;">
              <img src="https://picsum.photos/id/1018/800/400" class="thumbnail">
              <div class="live-badge">LIVE</div>
            </div>
            <div class="card-body">
              <div style="font-weight:700;">RCB vs CSK</div>
              <div style="color:#22c55e; font-size:1.4rem; margin:8px 0;">189/5 (19.2 ov)</div>
              <button onclick="alert('AI Analyst: RCB strong in death overs!')">🤖 AI Analyst</button>
            </div>
          </div>
        `;
      } 
      else if (section === 'community') {
        content.innerHTML = `
          <h2 style="margin:20px 0 15px;">IPL Teams Community</h2>
          <div class="community-grid">
            ${['CSK','MI','RCB','KKR','GT','SRH','PBKS','DC','RR','LSG'].map(team => `
              <div class="team-card" onclick="joinCommunity('${team}')">
                <div class="team-logo">${team}</div>
                <div>${team}</div>
              </div>
            `).join('')}
          </div>
        `;
      } 
      else if (section === 'videos') {
        content.innerHTML = `<p style="padding:60px 20px; text-align:center; color:#94a3b8;">Featured Videos & Highlights coming soon...</p>`;
      }
    }

    function joinCommunity(team) {
      alert(`✅ You joined ${team} Community!\n\nDiscuss matches, polls, fan predictions with other ${team} fans.`);
    }

    // Initial Load
    window.onload = () => showSection('home');
  </script>
</body>
</html>
